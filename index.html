<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>ROBI</title><script>(function(){try{var o=localStorage.getItem("robi_theme");var h=new Date().getHours();var t=(o==="day"||o==="night")?o:((h>=5&&h<18)?"day":"night");document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","night");}})();</script>
</head><body>
<style>
:root{
  --violet:#7b5cff; --blue:#3b6bff; --cyan:#22c9ee; --mint:#2fd39b; --pink:#ff6fb5; --amber:#ffb457; --gold:#ffcf4d;
  --s-physique:#22c9ee; --s-mental:#7b5cff; --s-creativite:#ff6fb5; --s-business:#ffb457; --s-social:#2fd39b; --s-discipline:#3b6bff;
  --r-xl:28px; --r-lg:22px; --r-md:16px; --r-sm:12px; --r-pill:999px;
  --font:system-ui,-apple-system,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;
  --iri:conic-gradient(from 120deg,#ff6fb5,#7b5cff,#3b6bff,#22c9ee,#2fd39b,#ffd08a,#ff6fb5);
  --blur:blur(22px) saturate(1.5);
  --line:var(--brd); --line-soft:var(--brd2); --panel:var(--glass2); --panel2:var(--glass);
  --cyan-b:#bfeaff; --cyan-d:#1f7fbf; --gold-b:#ffe0a3; --red:#ff7385; --green:#2fd39b; --orange:#ff9d6b;
}
html[data-theme="day"]{
  --bg1:#eef1f8; --bg2:#e6e9f4;
  --glass:rgba(255,255,255,.6); --glass2:rgba(255,255,255,.42); --glass3:rgba(255,255,255,.28);
  --brd:rgba(255,255,255,.85); --brd2:rgba(120,140,190,.22); --hi:rgba(255,255,255,.9);
  --txt:#182036; --dim:#5c6b86; --dim2:#93a1ba;
  --track:rgba(30,50,110,.1); --shadow:0 22px 50px -24px rgba(60,80,150,.5);
  --bodybg:radial-gradient(900px 620px at 12% -4%,rgba(123,92,255,.2),transparent 56%),radial-gradient(900px 640px at 104% 16%,rgba(34,201,238,.18),transparent 56%),radial-gradient(820px 640px at 62% 108%,rgba(255,111,181,.16),transparent 56%),linear-gradient(160deg,var(--bg1),var(--bg2));
}
html[data-theme="night"]{
  --bg1:#0a1526; --bg2:#0c1a30;
  --glass:rgba(26,42,72,.58); --glass2:rgba(20,34,60,.44); --glass3:rgba(16,28,50,.4);
  --brd:rgba(150,190,240,.2); --brd2:rgba(150,190,240,.14); --hi:rgba(255,255,255,.1);
  --txt:#eaf1fb; --dim:#a2b6d3; --dim2:#647a9c;
  --track:rgba(121,208,255,.12); --shadow:0 26px 62px -26px rgba(0,0,0,.75);
  --bodybg:radial-gradient(1000px 720px at 18% -4%,rgba(123,92,255,.22),transparent 58%),radial-gradient(1000px 720px at 104% 16%,rgba(59,107,255,.18),transparent 58%),radial-gradient(900px 660px at 60% 118%,rgba(34,201,238,.14),transparent 60%),linear-gradient(180deg,var(--bg1),var(--bg2));
}
*{box-sizing:border-box}
html{height:100%}
body{margin:0;background:var(--bodybg);background-attachment:fixed;color:var(--txt);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden;transition:background .7s ease,color .4s ease;height:100dvh}
#app{max-width:1120px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;padding:12px 16px 0}
#view{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding-bottom:96px}
@media(max-width:400px){#app{padding:10px 11px 0}}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex:none}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{position:relative;width:40px;height:40px;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:var(--glass2);box-shadow:0 0 18px -4px var(--violet)}
.brand .mark::before{content:"";position:absolute;inset:0;border-radius:50%;padding:2px;background:var(--iri);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;pointer-events:none}
.brand .mark svg{width:30px;height:30px;position:relative}
.ubadge{position:absolute;top:3px;right:3px;width:9px;height:9px;border-radius:50%;background:#ff3b57;box-shadow:0 0 7px #ff3b57;z-index:4;animation:upulse 1.5s ease-in-out infinite}
@keyframes upulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.6}}
.brand h1{font-size:17px;font-weight:700;letter-spacing:.01em;margin:0;color:var(--txt)}
.brand small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim2);text-transform:uppercase;margin-top:1px}
.hud-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim)}
.hud-status .dot{width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{50%{opacity:.35}}
.tools{display:flex;gap:8px}
.icobtn{position:relative;overflow:hidden;width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:var(--glass2);color:var(--dim);border:1px solid var(--brd2);cursor:pointer;font-size:15px;transition:.2s}
.icobtn:hover{color:var(--txt);transform:translateY(-1px)}

.win{position:relative;background:linear-gradient(180deg,var(--glass),var(--glass2));border:1px solid var(--brd);border-radius:var(--r-lg);box-shadow:var(--shadow),inset 0 1px 0 var(--hi);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);padding:18px;margin-bottom:14px}
.win.iri::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.3px;background:var(--iri);opacity:.7;-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;pointer-events:none}
.win-h{display:flex;align-items:center;gap:10px;margin:0 0 14px}
.win-h .t{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--txt)}
.win-h .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--brd2),transparent)}
.win-h .r{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em}

.plab{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:9px;margin-bottom:13px}
.plab::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--brd2),transparent)}
/* ---- Cockpit : journalières à gauche, prioritaires à droite ---- */
.todaycols{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.todaycol{min-width:0}
.todaycol .plab{margin-bottom:8px}
.q.cpt{padding:8px 3px;gap:9px}
.q.cpt .body{min-width:0;flex:1}
.q.cpt .ttl{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q.cpt .meta{margin-top:3px}
.q.cpt .xpv{flex:none}
.subhead{font-family:var(--font);font-size:12.5px;letter-spacing:0;color:var(--dim);margin:4px 0 12px;line-height:1.5}

/* ---- cockpit ---- */
.cocktabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.cocktab{flex:none;position:relative;overflow:hidden;font-family:var(--font);font-size:13px;font-weight:600;color:var(--dim);background:var(--glass2);border:1px solid var(--brd2);border-radius:var(--r-pill);padding:8px 15px;cursor:pointer;white-space:nowrap}
.cocktab.on{color:#fff;border-color:transparent;background:linear-gradient(120deg,var(--violet),var(--blue));box-shadow:0 8px 20px -10px var(--blue)}
.cockbody{display:flex;flex-direction:column;gap:14px}
.propcard{display:flex;align-items:center;gap:12px;padding:11px 3px;border-bottom:1px solid var(--track)}
.propcard:last-child{border-bottom:0}
.propcard .pa{cursor:pointer;font-size:15px;padding:2px 6px}
.propcard .pa.add{color:var(--mint)}.propcard .pa.no{color:var(--dim2)}.propcard .pa.no:hover{color:var(--pink)}
/* ---- SOLO LEWE (système secret) ---- */
body.solo-mode{background:#010207}
body.solo-mode .topbar{display:none}
body.solo-mode nav{background:rgba(4,9,20,.88);border-color:rgba(77,184,255,.28);box-shadow:0 0 30px -14px #4db8ff}
/* --- Tableau de bord : grille de cartes plutôt qu'une pile verticale --- */
.ckgrid{display:grid;grid-template-columns:minmax(260px,330px) 1fr;gap:11px;align-items:start}
.ckcol{display:flex;flex-direction:column;gap:11px;min-width:0}
@media(max-width:860px){.ckgrid{grid-template-columns:1fr}}
.capgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:9px}
.capmini{position:relative;cursor:pointer;padding:11px 8px 10px;border-radius:14px;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.012));border:1px solid rgba(127,155,208,.22);transition:transform .18s,border-color .18s,box-shadow .18s}
.capmini:hover{transform:translateY(-2px);border-color:var(--cc)}
.capmini.on{border-color:var(--cc);box-shadow:0 0 22px -9px var(--cc)}
.cmic{font-size:19px;line-height:1}
.cmn{font-family:var(--mono);font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:#7f9bd0;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cml{font-family:var(--mono);font-size:11.5px;color:#dce9ff;margin-top:3px}
.cmd{position:absolute;top:6px;right:8px;font-size:10px;color:#4a628f}
.capmini.on .cmd{color:var(--cc)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:11px}
.pcard{position:relative;cursor:pointer;padding:14px 14px 13px 17px;border-radius:16px;overflow:hidden;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.015));border:1px solid rgba(127,155,208,.2);transition:transform .18s,border-color .18s,box-shadow .18s}
.pcard:before{content:"";position:absolute;top:0;bottom:0;left:0;width:3px;background:var(--pc)}
.pcard:hover{transform:translateY(-2px);border-color:var(--pc);box-shadow:0 12px 32px -18px var(--pc)}
.pch{display:flex;align-items:flex-start;gap:8px;margin-bottom:11px;padding-right:22px}
.pcn{font-family:var(--font);font-size:13.5px;font-weight:600;color:#e6f1ff;line-height:1.3;flex:1;min-width:0}
.pcbar{height:6px;border-radius:4px;background:rgba(127,155,208,.16);overflow:hidden}
.pcbar i{display:block;height:100%;border-radius:4px;background:var(--pc);transform-origin:left;transition:transform .5s}
.pcf{display:flex;justify-content:space-between;gap:8px;margin-top:9px;font-family:var(--mono);font-size:9.5px;color:#7f9bd0}
.pcf .nx{color:#ffcf6f}
.pcgo{position:absolute;top:9px;right:10px;color:#4a628f;font-size:17px;line-height:1;padding:2px 6px;border-radius:8px}
.pcgo:hover{color:#8fe6ff;background:rgba(77,184,255,.14)}
.capstate{position:relative;text-align:center}
.capstate .capgo{position:absolute;top:0;right:0;cursor:pointer;font-size:15px;opacity:.55}
.capstate .capgo:hover{opacity:1}
.csbig{font-family:var(--mono);font-size:17px;letter-spacing:.1em;font-weight:700;margin:2px 0 4px}
.capstate.ok .csbig{color:#8fe6ff;text-shadow:0 0 18px rgba(77,184,255,.45)}
.capstate.todo .csbig{color:#ffcf6f;text-shadow:0 0 18px rgba(255,180,80,.35)}
.cssub{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:#7f9bd0;margin-bottom:12px}
.wkstrip{display:flex;gap:5px;margin:4px 0 10px}
.wkstrip i{flex:1;height:9px;border-radius:3px;background:rgba(77,184,255,.12);border:1px solid rgba(77,184,255,.2)}
.wkstrip i.on{background:linear-gradient(180deg,#8fe6ff,#3ac2ff);border-color:#8fe6ff;box-shadow:0 0 10px -2px #4db8ff}
.wkmsg{font-family:var(--mono);font-size:9.5px;letter-spacing:.03em;color:#7f9bd0}
.q .more{color:var(--dim2);cursor:pointer;font-size:17px;line-height:1;padding:2px 7px;flex:none;border-radius:8px}
.q .more:hover{color:var(--txt);background:rgba(127,155,208,.12)}
.q .more.on{color:var(--pink)}
body.solo-mode nav button{color:#6f8cc4}
body.solo-mode nav button:hover{color:#dce9ff}
body.solo-mode nav button.on{color:#fff;background:linear-gradient(120deg,#3b2fb8,#1e7fd6);box-shadow:0 0 18px -6px #4db8ff}
body.solo-mode #view{padding-bottom:24px}
.solo{color:#cfe2ff;font-family:var(--mono);display:flex;flex-direction:column;gap:11px;min-height:calc(100dvh - 34px);padding:6px 0 18px;
  background:radial-gradient(1000px 700px at 50% -12%,rgba(77,184,255,.16),transparent 56%),radial-gradient(700px 600px at 10% 116%,rgba(154,134,255,.12),transparent 60%),radial-gradient(600px 560px at 92% 6%,rgba(255,59,87,.08),transparent 55%)}
.solo .tbar{text-align:center;letter-spacing:.4em;font-size:14px;font-weight:800;color:#fff;text-shadow:0 0 24px #4db8ff;padding:6px 0}
.solo .tbar small{display:block;font-size:9px;letter-spacing:.3em;color:#5a76ac;margin-top:5px;font-weight:400}
.spanel{position:relative;background:linear-gradient(180deg,rgba(9,18,36,.8),rgba(4,9,20,.7));border:1px solid rgba(77,184,255,.45);box-shadow:0 0 30px -12px #4db8ff,inset 0 0 44px -18px rgba(77,184,255,.5);padding:15px;clip-path:polygon(13px 0,100% 0,100% calc(100% - 13px),calc(100% - 13px) 100%,0 100%,0 13px)}
.spanel::before,.spanel::after{content:"";position:absolute;width:14px;height:14px;border:2px solid #4db8ff;opacity:.7}
.spanel::before{top:5px;left:5px;border-right:0;border-bottom:0}.spanel::after{bottom:5px;right:5px;border-left:0;border-top:0}
.spl{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#4db8ff;margin-bottom:12px;display:flex;gap:8px}
.spl::before{content:"◤"}.spl::after{content:"◢";margin-left:auto}
.srank{display:flex;align-items:center;gap:14px}
.rbig{font-weight:800;font-size:52px;line-height:.9;text-shadow:0 0 26px currentColor}
.srank .rt{flex:1;min-width:0}
.srank .who{font-size:15px;color:#fff;letter-spacing:.06em;margin:2px 0 8px}
.srank .rl{font-size:10px;letter-spacing:.14em;color:#5a76ac;text-transform:uppercase}
.sbar{height:8px;background:rgba(77,184,255,.1);border:1px solid rgba(77,184,255,.4);position:relative;overflow:hidden;margin-top:5px}
.sbar i{position:absolute;inset:0;transform-origin:left}
.sxp{display:flex;justify-content:space-between;font-size:10px;color:#5a76ac;margin:12px 0 5px}
.scap{display:grid;grid-template-columns:150px 1fr 46px;align-items:center;gap:10px;font-size:12px;padding:5px 0}
.scap .n{color:#cfe2ff}.scap .tr{height:6px;background:rgba(77,184,255,.1);border:1px solid rgba(77,184,255,.22);position:relative;overflow:hidden}
.scap .tr i{position:absolute;inset:0;transform-origin:left;background:linear-gradient(90deg,#3a7de0,#8fe6ff)}
.scap{grid-template-columns:150px 1fr 46px 24px}
.scap .lv{color:#8fe6ff;text-align:right}
.scap .capgo{cursor:pointer;text-align:right;font-size:13px;opacity:.75;transition:.2s}.scap .capgo:hover{opacity:1;transform:scale(1.15)}
.capgoal{margin:2px 0 12px;padding:9px 11px;border-left:2px solid #4db8ff;background:rgba(77,184,255,.06);font-size:11.5px}
.capgoal.ok{border-color:#43d9a3;background:rgba(67,217,163,.07)}
.capgoal.tight{border-color:#ffd45a;background:rgba(255,212,90,.07)}
.capgoal.no{border-color:#ff6b82;background:rgba(255,107,130,.07)}
.capgoal.learn{border-color:#7f9bd0;background:rgba(127,155,208,.06)}
.cgl{display:flex;justify-content:space-between;color:#dce9ff;font-weight:600;letter-spacing:.02em}
.cgm{color:#a9c2ea;margin-top:5px}.cgm b{color:#fff}
.cgv{margin-top:5px;color:#cfe2ff}
.capgoal.ok .cgv{color:#8fe6c8}.capgoal.tight .cgv{color:#ffe08a}.capgoal.no .cgv{color:#ff9db0}.capgoal.learn .cgv{color:#a9c2ea}
.capprev{margin-top:14px;padding:11px 13px;border-radius:8px;background:#0c1424;border:1px solid rgba(77,184,255,.4);font-size:12px;line-height:1.5}
.capprev .cgm{color:#a9c2ea}.capprev .cgm b{color:#fff}.capprev .cgv{margin-top:6px;color:#cfe2ff}
.capprev.ok{border-color:#43d9a3}.capprev.ok .cgv{color:#8fe6c8}
.capprev.tight{border-color:#ffd45a}.capprev.tight .cgv{color:#ffe08a}
.capprev.no{border-color:#ff6b82}.capprev.no .cgv{color:#ff9db0}
.capprev.learn{border-color:#7f9bd0}.capprev.learn .cgv{color:#a9c2ea}
.sttl{display:inline-flex;gap:7px;font-size:12px;color:#ffd45a;border:1px solid rgba(255,212,90,.4);background:rgba(255,212,90,.08);padding:6px 11px;margin:3px 6px 3px 0}
.svoice{font-size:12px;line-height:1.65;color:#8fe6ff;border-left:2px solid #4db8ff;padding:4px 0 4px 12px}
.svoice b{color:#4db8ff}
.sreset{font-size:10px;letter-spacing:.14em;color:#5a76ac;cursor:pointer;text-transform:uppercase;border:1px solid rgba(77,184,255,.45);background:transparent;padding:10px 12px;align-self:center;margin-top:6px}
.stabs{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:2px 0 3px}
.stab{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#5a76ac;background:rgba(9,18,36,.6);border:1px solid rgba(77,184,255,.28);padding:8px 12px;cursor:pointer;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);transition:.2s}
.stab.on{color:#04203a;background:linear-gradient(120deg,#8fe6ff,#4db8ff);border-color:#8fe6ff;box-shadow:0 0 18px -6px #4db8ff}
.sbody{display:flex;flex-direction:column;gap:11px}
.uquest{position:relative;border:1px solid rgba(255,59,87,.55);background:linear-gradient(180deg,rgba(40,8,16,.82),rgba(20,4,10,.75));box-shadow:0 0 34px -10px #ff3b57,inset 0 0 40px -20px #ff3b57;padding:15px;clip-path:polygon(13px 0,100% 0,100% calc(100% - 13px),calc(100% - 13px) 100%,0 100%,0 13px);animation:uqin .5s ease}
@keyframes uqin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.uqh{font-size:10px;letter-spacing:.2em;color:#ff6b82;text-shadow:0 0 14px #ff3b57;font-weight:800}
.uqt{font-size:17px;color:#fff;font-weight:700;margin:9px 0 8px;line-height:1.3;font-family:var(--sans,inherit)}
.uqmeta{font-size:11px;color:#e79aa8;letter-spacing:.03em}.uqmeta b{color:#fff}
.uqtimer{font-size:12px;color:#ffd45a;margin-top:8px;letter-spacing:.04em}.uqtimer b{color:#fff}
.uquest .btn{background:linear-gradient(120deg,#ff3b57,#ff6b48);box-shadow:0 8px 22px -10px #ff3b57}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sstat{border:1px solid rgba(77,184,255,.22);background:rgba(77,184,255,.05);padding:9px 11px}
.sstat b{display:block;font-size:20px;color:#8fe6ff;line-height:1;margin-bottom:3px}
.sstat span{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#5a76ac}
body.solo-mode .win{background:linear-gradient(180deg,rgba(9,18,36,.82),rgba(4,9,20,.72));border:1px solid rgba(77,184,255,.3);box-shadow:0 0 26px -15px #4db8ff}
body.solo-mode .win-h .t{color:#dce9ff}
body.solo-mode .win-h .r{color:#5a76ac}
body.solo-mode .subhead,body.solo-mode .empty{color:#7f9bd0}
body.solo-mode .epr{color:#e6f1ff}
body.solo-mode .coachmsg{color:#dce9ff}
body.solo-mode .logline{color:#a9c2ea;border-color:rgba(77,184,255,.14)}

#secret{position:fixed;inset:0;z-index:80;display:none;place-items:center;background:rgba(1,2,7,.93)}
#secret.show{display:grid}
.secretwin{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.secrethint{font-family:var(--mono);font-size:10px;letter-spacing:.4em;color:#4db8ff;text-transform:uppercase}
.secretcore{width:76px;height:76px;border-radius:50%;cursor:pointer;display:grid;place-items:center;font-family:var(--mono);color:#04203a;font-weight:800;font-size:14px;background:radial-gradient(circle at 45% 40%,#d6f0ff,#4db8ff 72%);box-shadow:0 0 34px -2px #4db8ff,0 0 80px -8px #4db8ff}
.secretcore:active{transform:scale(.9)}
.secretdots{display:flex;gap:9px}.secretdots i{width:10px;height:10px;border-radius:50%;border:1px solid rgba(77,184,255,.5)}.secretdots i.on{background:#4db8ff;box-shadow:0 0 10px #4db8ff}
.a-hero{grid-area:hero}.a-today{grid-area:today}.a-obj{grid-area:obj}

.core{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.reactor{flex:none;width:min(120px,36vw);aspect-ratio:1;position:relative;display:grid;place-items:center}
.reactor svg{position:absolute;inset:0;width:100%;height:100%}
.ring-rot{transform-origin:50% 50%;animation:spin 24s linear infinite}
.ring-rot.rev{animation-duration:38s;animation-direction:reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.core-num{position:relative;text-align:center}
.core-num .big{font-family:var(--mono);font-size:clamp(26px,7vw,34px);font-weight:700;color:var(--txt);line-height:1}
.core-num .cap{font-family:var(--mono);font-size:8px;letter-spacing:.26em;color:var(--dim);margin-top:5px;text-transform:uppercase}
.core-info{flex:1;min-width:180px}
.core-info .who{font-size:19px;font-weight:700;color:var(--txt)}
.core-info .cozysub{font-size:12.5px;color:var(--dim);margin-top:7px;line-height:1.5}
.core-info .rank{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:var(--dim);margin-top:6px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.core-info .rank b{color:var(--amber);font-weight:600}
.brief{margin-top:15px;background:var(--glass3);border:1px solid var(--brd2);border-left:3px solid var(--violet);border-radius:var(--r-md);padding:12px 14px}
.brief .jarvis{display:block;font-family:var(--mono);font-size:8.5px;letter-spacing:.26em;color:var(--violet);text-transform:uppercase;margin-bottom:6px}
.minigauges{display:flex;gap:18px;margin-top:15px;flex-wrap:wrap;align-items:center}
.mg{display:flex;align-items:center;gap:9px}
.mg .gv{position:relative;width:48px;height:48px;display:grid;place-items:center}
.mg .gv svg{position:absolute;inset:0;width:100%;height:100%}
.mg .gv b{font-family:var(--mono);font-size:13px;color:var(--txt)}
.mg .gt{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--dim);text-transform:uppercase;line-height:1.5}
.mg .gt b{display:block;font-size:10.5px;color:var(--txt)}
.nm{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}

/* compagnon */
.companion{display:flex;align-items:center;gap:14px;margin-top:16px;padding:14px;border-radius:var(--r-md);background:var(--glass3);border:1px solid var(--brd2);cursor:pointer;touch-action:manipulation}
.companion .av{flex:none;position:relative;filter:drop-shadow(0 6px 10px rgba(0,0,0,.25))}
.companion.pet .av{animation:pet .5s ease}
@keyframes pet{40%{transform:translateY(-6px) scale(1.05)}70%{transform:translateY(0) scale(.98)}}
.companion .ct{flex:1;min-width:0}
.companion .ct .cm{font-size:14px;font-weight:600;color:var(--txt)}
.companion .ct .cd{font-size:12px;color:var(--dim);margin-top:3px;line-height:1.45}
.breathe{animation:breathe 4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.ears{animation:twitch 5.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center bottom}
@keyframes breathe{50%{transform:scale(1.02) translateY(-1.5px)}}
@keyframes twitch{0%,90%,100%{transform:rotate(0)}94%{transform:rotate(-6deg)}97%{transform:rotate(3deg)}}
@keyframes rise{0%{opacity:0;transform:translateY(4px) scale(.7)}25%{opacity:1}100%{opacity:0;transform:translateY(-14px) scale(1.05)}}
.fx{animation:rise 2.7s ease-in-out infinite}.fx.d1{animation-delay:1s}
.rrot{animation:spin 16s linear infinite;transform-box:fill-box;transform-origin:center}

.bar{height:8px;border-radius:var(--r-pill);background:var(--track);position:relative;overflow:hidden}
.bar>i{position:absolute;inset:0;transform-origin:left;border-radius:var(--r-pill);background:linear-gradient(90deg,var(--violet),var(--blue),var(--cyan));transition:transform .8s cubic-bezier(.2,.7,.2,1)}
.xprow .lab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-bottom:5px;letter-spacing:.03em}

.sys{display:flex;flex-direction:column;gap:8px}
.sysrow{display:grid;grid-template-columns:118px 1fr 42px;align-items:center;gap:10px}
.sysrow .n{font-size:12.5px;color:var(--txt)}
.sysrow .track{height:7px;border-radius:var(--r-pill);background:var(--track);position:relative;overflow:hidden}
.sysrow .track i{position:absolute;inset:0;transform-origin:left;border-radius:var(--r-pill)}
.sysrow .p{font-family:var(--mono);font-size:10.5px;color:var(--dim);text-align:right}

.objrow{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--track);cursor:pointer}
.objrow:last-child{border-bottom:0}
.objrow .otag{font-family:var(--mono);font-weight:700;font-size:14px;width:24px;text-align:center}
.objrow .oname{flex:1;font-size:13.5px;min-width:0}
.objrow .obar{flex:none;width:74px;height:6px;border-radius:var(--r-pill);background:var(--track);position:relative;overflow:hidden}
.objrow .obar i{position:absolute;inset:0;transform-origin:left;border-radius:var(--r-pill)}
.objrow .op{width:38px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--dim)}
/* ---- Tâches groupées par objectif ---- */
.taskgroup{border:1px solid var(--brd2);border-radius:var(--r-md);margin:8px 0;overflow:hidden;background:var(--glass3)}
.tghead{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;user-select:none;transition:background .15s}
.tghead:hover{background:var(--glass2)}
.tghead .tgchev{color:var(--dim2);font-size:11px;width:12px;flex:none}
.tghead .otag{font-family:var(--mono);font-weight:700;font-size:12px;width:auto;flex:none}
.tghead .tgtitle{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tghead .tgprog{flex:none;width:54px;height:6px;border-radius:var(--r-pill);background:var(--track);position:relative;overflow:hidden}
.tghead .tgprog i{position:absolute;inset:0;transform-origin:left;border-radius:var(--r-pill)}
.tghead .tgcount{flex:none;font-family:var(--mono);font-size:10px;color:var(--dim);min-width:30px;text-align:right}
.tghead .tgopen{flex:none;color:var(--dim2);font-size:20px;line-height:1;padding:0 3px;cursor:pointer}.tghead .tgopen:hover{color:var(--violet)}
.tgbody{padding:0 12px 4px}

/* ---- tâches ---- */
.q{display:flex;align-items:center;gap:12px;padding:12px 3px;border-bottom:1px solid var(--track)}
.q.pubrow{border:1px solid rgba(255,111,181,.42);border-radius:12px;padding:12px;margin:6px 0;background:linear-gradient(180deg,rgba(255,111,181,.09),transparent)}
.q.pubrow.late{border-color:rgba(255,111,181,.75);box-shadow:0 0 22px -10px #ff6fb5}
.q:last-child{border-bottom:0}
.check{position:relative;overflow:hidden;flex:none;width:26px;height:26px;border-radius:50%;border:1.6px solid var(--brd);background:var(--glass2);cursor:pointer;display:grid;place-items:center;color:transparent;font-size:13px;transition:.2s}
.check:hover{border-color:var(--violet);box-shadow:0 0 14px -3px var(--violet)}
.q.done .check{color:#fff;border-color:transparent;background:linear-gradient(120deg,var(--violet),var(--blue));box-shadow:0 0 16px -3px var(--blue)}
.q .body{flex:1;min-width:0}
.q .ttl{font-size:14.5px;color:var(--txt);letter-spacing:0}
.q.done .ttl{color:var(--dim2);text-decoration:line-through}
.q .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
.tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-size:10.5px;letter-spacing:0;padding:3px 9px;border-radius:var(--r-pill);border:1px solid;background:var(--glass2)}
.q .xpv{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.02em;white-space:nowrap}
.q .del,.q .gear,.q .mv,.q .edt{color:var(--dim2);cursor:pointer;font-size:15px;padding:2px 5px;flex:none}
.q .edt{font-size:14px}
.q .del:hover{color:var(--pink)}.q .gear:hover,.q .mv:hover,.q .edt:hover{color:var(--violet)}
.q.off{opacity:.5}
.q .check.off{cursor:default;border-color:var(--brd2);color:var(--dim2)}
.q .check.off:hover{border-color:var(--brd2);box-shadow:none}

.warn{display:flex;gap:10px;align-items:flex-start;font-size:12px;line-height:1.45;color:var(--amber);background:rgba(255,180,87,.12);border:1px solid rgba(255,180,87,.3);border-radius:var(--r-md);padding:11px 13px;margin-bottom:14px}
.alert{display:flex;gap:9px;align-items:center;font-size:12px;color:var(--pink);background:rgba(255,111,181,.1);border:1px solid rgba(255,111,181,.3);border-radius:var(--r-md);padding:9px 12px;margin-bottom:12px}

/* ---- stats/kpi ---- */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{padding:14px;border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2)}
.stat .top{display:flex;align-items:center;justify-content:space-between}
.stat .ic{font-size:19px}
.stat .sv{font-family:var(--mono);font-weight:700;font-size:22px;color:var(--txt)}
.stat .nm{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin:8px 0 7px}
.stat .bar{height:6px}
.stat .xp{font-family:var(--mono);font-size:9px;color:var(--dim2);margin-top:6px;letter-spacing:.03em}
.evgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:640px){.evgrid{grid-template-columns:repeat(2,1fr)}}
.kpi{padding:15px;border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2);text-align:center}
.kpi .v{font-family:var(--mono);font-weight:700;font-size:24px;color:var(--txt)}
.kpi .k{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:5px}
.logline{font-family:var(--mono);font-size:11px;color:var(--dim);padding:8px 4px;border-bottom:1px solid var(--track);letter-spacing:.01em}
.logline .tm{color:var(--dim2);float:right;font-size:10px}

/* échelle guerrière */
.ladder{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px}
@media(max-width:520px){.ladder{grid-template-columns:repeat(3,1fr)}}
.step{border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2);padding:10px 4px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.step.cur{border-color:var(--amber);box-shadow:0 0 20px -8px var(--amber)}
.step .rr{font-family:var(--mono);font-weight:700;font-size:14px}
.step .nn{font-size:10px;color:var(--dim);line-height:1.2}

/* ---- missions ---- */
.missions{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:640px){.missions{grid-template-columns:1fr}}
.mission{position:relative;padding:15px;border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2)}
.mission .mrank{position:absolute;top:12px;right:12px;font-family:var(--mono);font-weight:700;font-size:18px;width:34px;height:34px;display:grid;place-items:center;border-radius:10px;background:var(--glass3);border:1px solid var(--brd2)}
.mission .mt{font-size:13px;font-weight:600;color:var(--txt);padding-right:44px}
.mission .mn{font-size:12px;color:var(--dim);margin:6px 0 12px}
.mission .mp{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-bottom:6px}
.mission.clear{border-color:var(--mint)}
.mission.clear .mt{color:var(--mint)}

/* ---- journal ---- */
.jentry{padding:11px 4px;border-bottom:1px solid var(--track)}
.jentry .jh{display:flex;justify-content:space-between;align-items:center}
.jentry .jmo{font-size:22px}
.jentry .jd{font-family:var(--mono);font-size:10px;color:var(--dim)}
.jentry .jn{font-size:13px;color:var(--txt);margin-top:6px;line-height:1.5}
.bdtext{width:100%;min-height:110px;resize:vertical;border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2);color:var(--txt);padding:12px;font-family:inherit;font-size:14px;line-height:1.5}
.bdtext:focus{outline:none;border-color:var(--violet)}
.absrow{display:flex;align-items:center;gap:10px;font-size:13px;padding:10px 12px;border-radius:var(--r-md);border:1px solid var(--brd2);background:var(--glass2)}
.absrow .absst{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
.absrow .absx{cursor:pointer;color:var(--dim2);font-size:15px;padding:0 2px}
.absrow .absx:hover{color:var(--pink)}

/* ---- forms/boutons ---- */
.addrow{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.addrow input[type=text],.addrow input[type=number],.addrow input[type=date]{flex:1;min-width:140px;border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2);color:var(--txt);padding:11px 13px;font-family:var(--font);font-size:14px;outline:none}
.addrow input:focus{border-color:var(--violet)}
.addrow input::placeholder{color:var(--dim2)}
.selin{flex:none;max-width:180px;border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2);color:var(--txt);padding:11px 13px;font-family:var(--font);font-size:13.5px;outline:none;cursor:pointer}
.selin:focus{border-color:var(--violet)}
/* ---- Suivi du sommeil : mini graphe 7 nuits ---- */
.sleepbars{display:flex;gap:8px;align-items:flex-end;margin-top:16px}
.sleepbars .sb{flex:1;text-align:center;min-width:0}
.sleepbars .sbv{height:56px;display:flex;align-items:flex-end;background:var(--track);border-radius:6px;overflow:hidden}
.sleepbars .sbv i{display:block;width:100%;border-radius:6px}
.sleepbars .sbh{font-family:var(--mono);font-size:10.5px;color:var(--txt);margin-top:5px}
.sleepbars .sbl{font-family:var(--mono);font-size:9px;color:var(--dim2)}
.addrow select{border-radius:var(--r-md);background:var(--glass2);border:1px solid var(--brd2);color:var(--txt);padding:11px 10px;font-family:var(--mono);font-size:11px}
.btn{position:relative;overflow:hidden;font-family:var(--font);font-size:13.5px;font-weight:600;letter-spacing:0;cursor:pointer;color:#fff;border:0;background:linear-gradient(120deg,var(--violet),var(--blue));border-radius:var(--r-pill);padding:11px 17px;box-shadow:0 12px 26px -12px var(--blue);transition:transform .15s ease,box-shadow .2s ease}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.ghost{color:var(--txt);background:var(--glass2);border:1px solid var(--brd2);box-shadow:none}
.btn.sel{color:#fff;background:linear-gradient(120deg,var(--pink),var(--violet));box-shadow:0 10px 22px -10px var(--violet)}
.coachsel{margin-top:14px;font-size:12.5px;color:var(--dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cbtn{position:relative;overflow:hidden;font-family:var(--font);font-size:12.5px;font-weight:600;color:var(--dim);background:var(--glass2);border:1px solid var(--brd2);border-radius:var(--r-pill);padding:6px 14px;cursor:pointer}
.cbtn.on{color:#fff;border-color:transparent;background:linear-gradient(120deg,var(--amber),var(--gold));box-shadow:0 8px 18px -8px var(--amber)}
.mbanner{font-size:12.5px;color:var(--amber);border:1px solid rgba(255,180,87,.3);background:rgba(255,180,87,.1);border-radius:var(--r-md);padding:10px 13px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.mbanner a{color:var(--dim);cursor:pointer;font-size:11px;text-decoration:underline}
.mgrouplab{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin:14px 0 6px}
.mgroup{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.mdone{font-family:var(--mono);font-size:10.5px;color:var(--mint);align-self:center;padding:0 4px}

/* ---- chat ---- */
.chatbox{height:min(46vh,400px);overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:6px 2px}
.bub{max-width:86%;padding:10px 13px;font-size:13.5px;line-height:1.5;border:1px solid var(--brd2);border-radius:var(--r-md)}
.bub.me{align-self:flex-end;color:#fff;border-color:transparent;background:linear-gradient(120deg,var(--violet),var(--blue))}
.bub.gm{align-self:flex-start;background:var(--glass2);color:var(--txt)}
.bub.typing{color:var(--dim);letter-spacing:.3em}

/* ---- nav ---- */
nav{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:20;display:flex;gap:2px;max-width:calc(100vw - 20px);overflow-x:auto;padding:8px;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--brd);box-shadow:var(--shadow),inset 0 1px 0 var(--hi);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
nav button{position:relative;overflow:hidden;background:none;border:0;color:var(--dim2);cursor:pointer;padding:8px 12px;border-radius:var(--r-pill);font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;display:grid;justify-items:center;gap:4px;white-space:nowrap;transition:.25s}
nav button .ni{font-size:16px;line-height:1}
nav button.on{color:#fff;background:linear-gradient(120deg,var(--violet),var(--blue));box-shadow:0 8px 20px -10px var(--blue)}
nav button:hover{color:var(--txt)}
nav button.on:hover{color:#fff}

/* ---- overlays ---- */
#nstack{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:63;display:flex;flex-direction:column;gap:8px;width:min(400px,92vw);pointer-events:none}
.ncard{pointer-events:auto;background:linear-gradient(180deg,var(--glass),var(--glass2));border:1px solid var(--brd);border-radius:var(--r-md);box-shadow:var(--shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);padding:12px 14px;animation:ncardIn .35s ease both}
.ncard.out{animation:ncardOut .35s ease forwards}
.ncard .nt{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--violet);text-transform:uppercase}
.ncard .nti{font-size:14px;color:var(--txt);margin-top:5px;font-weight:600}
.ncard .nln{font-size:12px;color:var(--dim);margin-top:5px}
@keyframes ncardIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes ncardOut{to{opacity:0;transform:translateY(-10px)}}

#flash{position:fixed;inset:0;z-index:66;display:none;place-items:center;pointer-events:none}
#flash.show{display:grid}
.flashwin{text-align:center;pointer-events:auto;padding:20px;animation:flashIn .5s cubic-bezier(.2,.85,.25,1) both}
.flashwin .fbig{font-family:var(--font);font-weight:800;font-size:clamp(42px,12vw,84px);letter-spacing:-.01em;line-height:1;color:var(--violet);text-shadow:0 8px 40px rgba(123,92,255,.5)}
.flashwin.rank .fbig{color:var(--gold);text-shadow:0 8px 40px rgba(255,207,77,.5)}
.flashwin.pen .fbig{color:var(--pink);text-shadow:0 8px 40px rgba(255,111,181,.5)}
.flashwin.level .fbig{color:var(--cyan);text-shadow:0 8px 40px rgba(34,201,238,.5)}
.flashwin .fsub{font-family:var(--font);font-size:14px;letter-spacing:.02em;color:var(--dim);margin-top:12px}
.flashwin .fhint{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim2);margin-top:22px;animation:hintpulse 1.7s ease-in-out infinite}
@keyframes hintpulse{0%,100%{opacity:.4}50%{opacity:.9}}
@keyframes flashIn{0%{opacity:0;transform:scale(.6)}55%{opacity:1}100%{opacity:1;transform:scale(1)}}

#ask{position:fixed;inset:0;z-index:64;display:none;place-items:center;background:rgba(4,8,18,.55);backdrop-filter:blur(5px);padding:20px}
#ask.show{display:grid}
.askwin{width:min(430px,92vw);padding:24px;background:linear-gradient(180deg,var(--glass),var(--glass2));border:1px solid var(--brd);border-radius:var(--r-lg);box-shadow:var(--shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);animation:flashIn .3s ease both}

(function(){

// Ainsi, changer le fuseau horaire de l'appareil (ex : Los Angeles -> Nouméa) ne décale plus le "jour" de ROBI : pas de triche par changement de fuseau.
var GAME_OFFSET_MIN=660;
function today(){var g=new Date(Date.now()+GAME_OFFSET_MIN*60000);return g.getUTCFullYear()+"-"+String(g.getUTCMonth()+1).padStart(2,"0")+"-"+String(g.getUTCDate()).padStart(2,"0");}

var STATS={

function rankOf(lvl){var r=RANKS[0];for(var i=0;i<RANKS.length;i++){if(lvl>=RANKS[i].min)r=RANKS[i];}return r;}
function rankOrder(r){var i=["E","D","C","B","A","S"].indexOf(r);return i<0?0:i;} // S le plus élevé
function byRankDesc(a,b){return rankOrder(b.rank)-rankOrder(a.rank);} // du plus fort (S) au plus faible (E)

function guessProjStat(title){
  var t=(title||"").toLowerCase();

/* ---- Niveau d'une capacité = nombre de semaines où tu l'as touchée. La constance, pas le volume. ---- */
function weekKey(iso){
  var d=new Date((iso||today())+"T00:00:00Z");
  d.setUTCDate(d.getUTCDate()-((d.getUTCDay()+6)%7)+3); // jeudi de la semaine ISO
  var y=d.getUTCFullYear(),jan4=new Date(Date.UTC(y,0,4));
  var w=1+Math.round(((d-jan4)/86400000-3+((jan4.getUTCDay()+6)%7))/7);
  return y+"-W"+String(w).padStart(2,"0");
}

function capWeeks(k){var st=S.stats[k];return (st&&st.weeks)||[];}
function capLevel(k){return capWeeks(k).length+1;}
function capTouchedThisWeek(k){return capWeeks(k).indexOf(weekKey(today()))>=0;}
function touchCap(k){ // renvoie true seulement la première fois de la semaine
  var st=S.stats[k]||(S.stats[k]={level:1,xp:0,weeks:[]});

  var w=weekKey(today()),neuf=st.weeks.indexOf(w)<0;

}

function rollover(){
  if(!S.lastDate){S.lastDate=today();save();return null;}
  // On n'avance QUE vers l'avant : si l'horloge de l'appareil recule, on ne déclenche pas de rollover (anti-triche).
  if(today()<=S.lastDate)return null;
  var absent=isAbsent(S.lastDate); // la journée écoulée était couverte par une absence planifiée
  var dailies=S.quests.filter(function(q){return q.daily&&dueOn(q,S.lastDate);});
  var out=null;
  if(absent){
    log("Absence déclarée : journalières neutralisées pour le "+S.lastDate);
    out={k:"absent"};
  }else if(dailies.length){
    var allDone=dailies.every(function(q){return q.done;});
    if(allDone){S.streak++;if(S.streak>S.best)S.best=S.streak;log("Tâches journalières accomplies (série "+S.streak+")");out={k:"done",streak:S.streak};}
    else{S.hunter.xp=Math.max(0,S.hunter.xp-40);S.streak=0;S.combo=0;log("PÉNALITÉ : journalières non terminées (-40 XP)");out={k:"pen"};}
  }
  S.history.push({date:S.lastDate,level:S.hunter.level});if(S.history.length>120)S.history.shift();
  // Les tâches normales validées la veille sont retirées (déjà comptées et tracées dans le Journal de ROBI),
  // pour que la liste reste vivante et alignée sur ta progression. Les journalières, elles, se réinitialisent.
  S.quests=S.quests.filter(function(q){return q.daily||!q.done;});
  S.quests.forEach(function(q){if(q.daily)q.done=false;});
  S.lastDate=today();save();
  return out;
}

function openCapGoal(statKey){

/* ---- Roue de la chance : une tâche libre au hasard ---- */
function isBlocked(q){
  if(q.dependsOn){
    var dep=find(S.quests,q.dependsOn);if(dep)return !dep.done;
    var mis=find(S.missions,q.dependsOn);if(mis){var qs=S.quests.filter(function(x){return x.mission===mis.id&&x.id!==q.id;});return !(qs.length>0&&qs.every(function(x){return x.done;}));}
    return false;
  }
  return !!q.blocked;
}
function depName(q){
  if(!q.dependsOn)return "";
  var dep=find(S.quests,q.dependsOn);if(dep)return dep.title;
  var mis=find(S.missions,q.dependsOn);if(mis)return mis.title+" (objectif)";
  return "";
}

  var q=find(S.quests,qId);if(!q)return;

  h+='<div class="subhead" style="margin:6px 0 12px">Dans l\'objectif « '+esc(mis.title)+' », de quoi dépend cette tâche ? Elle restera en attente tant que ce n\'est pas terminé.</div><div style="display:grid;gap:8px">';

  sibs.forEach(function(x){h+='<button class="btn ghost" data-dep="'+x.id+'" style="text-align:left">✓ Après « '+esc(x.title)+' »'+(x.done?" (faite)":"")+(q.dependsOn===x.id?" ✓":"")+'</button>';});

  var c=q.cad||{};

  var isDaily=!isEveryN&&!isDays;

function isoPlus(ds,n){var d=new Date(ds+"T00:00:00Z");d.setUTCDate(d.getUTCDate()+n);return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0")+"-"+String(d.getUTCDate()).padStart(2,"0");}
function fmtD(ds){var p=String(ds).split("-");return p.length===3?p[2]+"/"+p[1]:ds;}

function cadLabel(q){var c=q.cad;if(q.paused)return "en pause";if(!c||(!(c.days&&c.days.length)&&(!c.n||c.n<=1)))return "chaque jour";if(c.days&&c.days.length){var J=["dim","lun","mar","mer","jeu","ven","sam"];return c.days.map(function(d){return J[d];}).join("/");}return "tous les "+c.n+" jours";}
function dueOn(q,ds){if(!q.daily)return true;if(q.paused)return false;var c=q.cad;if(!c)return true;if(c.days&&c.days.length)return c.days.indexOf(new Date(ds+"T12:00:00").getDay())>=0;var n=c.n||1;if(n<=1)return true;var anc=c.anchor||ds;var d=dayDiff(ds,anc);return ((d%n)+n)%n===0;}

/* ---- Planning de publication (par objectif) : tâche 4 jours avant la date, reste jusqu'à validation, et met en retrait les autres tâches de l'objectif ---- */
function makePubQuest(m,d){return {id:"pub_"+m.id+"_"+d,pub:true,pubDate:d,mission:m.id,title:"Publier « "+m.title+" » du "+fmtD(d),stat:"business",prio:"high",base:40,done:false};}
function pubEligibleDate(m){ // la date la plus proche non publiée dont la fenêtre (J-4) a commencé
  if(!m.pubDates||!m.pubDates.length)return null;
  var t=today(),elig=m.pubDates.filter(function(d){return t>=isoPlus(d,-4);}).slice().sort();
  return elig.length?elig[0]:null;
}
function pubTick(){ // synchronise les tâches de publication avec les dates planifiées (une seule active par objectif)
  var changed=false;
  (S.missions||[]).forEach(function(m){
    // 1) toute publication déjà validée : on retire sa date du planning (elle est publiée)
    S.quests.forEach(function(q){if(q.pub&&q.mission===m.id&&q.done&&m.pubDates){var n=m.pubDates.length;m.pubDates=m.pubDates.filter(function(d){return d!==q.pubDate;});if(m.pubDates.length!==n)changed=true;}});
    var keep=pubEligibleDate(m);
    // 2) on retire les tâches de publication validées OU obsolètes (une seule active à la fois)
    S.quests=S.quests.filter(function(q){if(q.pub&&q.mission===m.id&&(q.done||q.pubDate!==keep)){changed=true;return false;}return true;});
    if(keep&&!S.quests.some(function(q){return q.pub&&q.mission===m.id&&q.pubDate===keep;})){S.quests.push(makePubQuest(m,keep));changed=true;}
  });
  if(changed)save();
}

/* ---- ROBI (chat) ---- */
var chatBusy=false;
var manageId=null;
function openManage(id){var q=find(S.quests,id);if(!q)return;closeModal();manageId=id;view="maitre";render();
  sendChat("Je veux gérer ma tâche journalière « "+q.title+" » (actuellement "+cadLabel(q)+"). Aide-moi à changer sa fréquence (tous les N jours, ou certains jours de la semaine), la mettre en pause, la réactiver, ou la retirer. Pose-moi une question courte, puis j'appliquerai.");}
function applyDailyEdit(){
  if(chatBusy||!manageId)return;
  var q=find(S.quests,manageId);if(!q){manageId=null;render();return;}
  var recent=(S.chat||[]).slice(-8).map(function(mm){return (mm.role==="user"?"Moi: ":"ROBI: ")+mm.content;}).join("\n");
  toast("ROBI ajuste...");
  gm("edit_daily",{description:recent,quest:{id:q.id,title:q.title,cad:q.cad||null,paused:!!q.paused}}).then(function(r){
    if(!r||!r.op||r.op==="none"){pushChat("assistant","Je n'ai pas saisi le changement. Précise (ex : « tous les 2 jours », « lundi mercredi vendredi », « pause », « retire-la »).");renderChat();return;}
    var msg="";
    if(r.op==="cadence_everyN"){var n=Math.max(1,r.everyN||1);q.cad={n:n,anchor:today()};q.paused=false;msg=n<=1?"« "+q.title+" » revient chaque jour.":"« "+q.title+" » : désormais tous les "+n+" jours.";}
    else if(r.op==="cadence_weekdays"){var days=(r.weekdays||[]).filter(function(d){return d>=0&&d<=6;});if(!days.length){pushChat("assistant","Quels jours précisément ?");renderChat();return;}q.cad={days:days};q.paused=false;msg="« "+q.title+" » : désormais "+cadLabel(q)+".";}
    else if(r.op==="pause"){q.paused=true;msg="« "+q.title+" » mise en pause. Elle ne compte plus dans les journalières.";}
    else if(r.op==="resume"){q.paused=false;msg="« "+q.title+" » réactivée : "+cadLabel(q)+".";}
    else if(r.op==="delete"){S.quests=S.quests.filter(function(x){return x.id!==q.id;});msg="« "+q.title+" » retirée des journalières.";}
    else{pushChat("assistant","Action inconnue.");renderChat();return;}
    save();manageId=null;view="cockpit";pushChat("assistant","✔ "+msg);log("Journalière ajustée : "+q.title);render();
  }).catch(function(){toast("Erreur réseau");});
}
function pushChat(role,content){S.chat=S.chat||[];S.chat.push({role:role,content:content});if(S.chat.length>60)S.chat.shift();save();}
function renderChat(){
  var box=document.getElementById("chatbox");if(!box)return;
  var msgs=S.chat||[];
  var html=msgs.length?msgs.map(function(mm){return '<div class="bub '+(mm.role==="user"?"me":"gm")+'">'+esc(mm.content).replace(/\n/g,"<br>")+'</div>';}).join(""):'<div class="empty">Parle à ROBI. Il te met à l\'épreuve et t\'aide à créer tes tâches.</div>';
  if(chatBusy)html+='<div class="bub gm typing">…</div>';
  box.innerHTML=html;box.scrollTop=box.scrollHeight;
}
function sendChat(message){
  if(chatBusy||!message)return;
  pushChat("user",message);chatBusy=true;renderChat();
  gm("chat",{message:message,history:(S.chat||[]).slice(0,-1).slice(-16),state:apiState()}).then(function(r){
    chatBusy=false;pushChat("assistant",(r&&r.reply)?r.reply:"(ROBI est silencieux. Réessaie.)");if(view==="maitre")renderChat();
  }).catch(function(){chatBusy=false;pushChat("assistant","(Connexion à ROBI impossible. Réessaie.)");if(view==="maitre")renderChat();});
}
function makeQuestFromChat(){
  if(chatBusy)return;
  var el=document.getElementById("c-input");var pending=el?el.value.trim():"";if(el)el.value="";
  if(pending){pushChat("user",pending);renderChat();}
  var recent=(S.chat||[]).slice(-8).map(function(mm){return (mm.role==="user"?"Moi: ":"ROBI: ")+mm.content;}).join("\n");
  if(!recent){toast("Écris d'abord ce que tu veux faire");return;}
  var dungeons=S.missions.map(function(m){return {id:m.id,title:m.title};});
  toast("ROBI prépare la tâche...");
  gm("make_quest",{description:recent,dungeons:dungeons}).then(function(q){
    if(!q||!q.title){toast("Impossible de créer la tâche");return;}
    var stat=STATS[q.stat]?q.stat:"mental";
    var prio=["high","med","low"].indexOf(q.prio)>=0?q.prio:"med";
    var daily=!!q.daily;
    var mission=(q.mission&&find(S.missions,q.mission))?q.mission:null;
    S.quests.push({id:uid(),title:q.title,stat:stat,daily:daily,prio:prio,base:baseFor(prio,daily),done:false,mission:mission});save();
    pushChat("assistant","✔ Tâche créée : « "+q.title+" » ("+STATS[stat].name+", "+(daily?"journalière":"priorité "+prio)+").");if(view==="maitre")renderChat();
    sysNotify("Tâche créée",q.title,[STATS[stat].name]);
  }).catch(function(){toast("Erreur réseau");});
}
function claimEpreuve(){
  if(chatBusy)return;

  S.lastEpreuve=today();S.epreuveOn=null;

}
var reviewMode=false;
// Quotidien au départ (le temps que ROBI comprenne bien tes projets), puis hebdomadaire après 7 bilans.
function reviewInterval(){return (S.reviewCount||0)<7?1:7;}
function reviewLabel(){return reviewInterval()===1?"Bilan du jour":"Bilan hebdo";}
function reviewDue(){return !S.lastReview||dayDiff(today(),S.lastReview)>=reviewInterval();}
function startReview(){
  reviewMode=true;view="maitre";
  var projs=S.missions.map(function(m){return "• "+m.title+" (rang "+m.rank+")";}).join("\n");
  var daily=reviewInterval()===1;
  pushChat("assistant","📋 "+(daily?"Point du jour":"Bilan hebdomadaire")+". Faisons le point projet par projet, sans détour. Pour chacun de tes objectifs, dis-moi où tu en es et la prochaine étape :\n\n"+projs+"\n\nÉcris ton point ci-dessous (un seul message suffit), puis touche « Réaligner mes tâches ».");

}
function applyReview(){
  if(chatBusy)return;
  // On lit ce que tu as écrit dans le champ SANS l'envoyer au mentor : ça évite un appel coûteux, seul le réalignement (modèle économique) tourne.
  var el=document.getElementById("c-input");var pending=el?el.value.trim():"";if(el)el.value="";
  if(pending)pushChat("user",pending);
  var recent=(S.chat||[]).slice(-14).map(function(mm){return (mm.role==="user"?"Moi: ":"ROBI: ")+mm.content;}).join("\n");
  if(!recent){toast("Écris d'abord ton point du jour");renderChat();return;}
  var dungeons=S.missions.map(function(m){return {id:m.id,title:m.title,note:m.note||"",rank:m.rank};});
  toast("ROBI réaligne tes tâches...");renderChat();
  gm("weekly_review",{dungeons:dungeons,description:recent}).then(function(res){
    var qs=(res&&res.quests)||[];
    if(!qs.length){pushChat("assistant","Je n'ai pas assez d'éléments. Dis-m'en un peu plus sur chaque projet, puis retouche « Réaligner ».");renderChat();return;}
    var added=0;
    qs.slice(0,12).forEach(function(x){
      var stat=STATS[x.stat]?x.stat:"discipline";
      var prio=["high","med","low"].indexOf(x.prio)>=0?x.prio:"med";
      var mission=(x.mission&&find(S.missions,x.mission))?x.mission:null;
      S.quests.push({id:uid(),title:x.title,stat:stat,daily:false,prio:prio,base:baseFor(prio,false),done:false,mission:mission});added++;
    });
    S.lastReview=today();S.reviewCount=(S.reviewCount||0)+1;reviewMode=false;log("Bilan : "+added+" tâches réalignées");save();
    sysNotify("Bilan validé",added+" tâches réalignées",["Ta liste suit ta progression"]);
    pushChat("assistant","✔ J'ai réaligné ta liste : "+added+" nouvelles tâches ajoutées, en phase avec où vous en êtes. C'est parti.");
    render();
  }).catch(function(){toast("Erreur réseau");});
}

/* ---- Conversation ROBI contextuelle (par tâche / par objectif) ---- */
var convoBusy=false;
function convoEntity(kind,id){return kind==="obj"?find(S.missions,id):find(S.quests,id);}
function convoSeed(kind,e){
  if(kind==="obj"){
    var qs=S.quests.filter(function(q){return q.mission===e.id;});
    var titles=qs.map(function(q){return "- "+q.title+(q.done?" (fait)":"");}).join("\n");
    return "Objectif : « "+e.title+" »"+(e.note?(" ("+e.note+")"):"")+". Voici mes tâches actuelles pour cet objectif :\n"+(titles||"(aucune pour l'instant)")+"\n\nExplique-moi en bref pourquoi ces tâches font avancer l'objectif et pourquoi elles valent la peine, puis propose-moi la prochaine étape concrète. Reste concis et actionnable.";
  }
  return "J'ai cette tâche à accomplir : « "+e.title+" »"+(e.mission?(" (objectif : "+((find(S.missions,e.mission)||{}).title||"")+")"):"")+". Explique-moi concrètement comment m'y prendre, en quelques étapes simples et faisables. Reste concret et bref.";
}
function openConvo(kind,id){
  var e=convoEntity(kind,id);if(!e)return;
  e.chat=e.chat||[];
  renderConvo(kind,id);
  if(!e.chat.length&&!convoBusy)convoAsk(kind,id,convoSeed(kind,e),true);
}
function renderConvo(kind,id){
  var e=convoEntity(kind,id);if(!e)return;
  var msgs=e.chat||[];
  var h='<div class="mtag">▸ ROBI · '+(kind==="obj"?"Objectif":"Tâche")+'</div><div class="mtitle">'+esc(e.title)+'</div>';
  h+='<div id="convobox" class="chatbox" style="height:min(42vh,360px)">'+(msgs.length?msgs.map(function(m){return '<div class="bub '+(m.role==="user"?"me":"gm")+'">'+esc(m.content).replace(/\n/g,"<br>")+'</div>';}).join(""):'<div class="empty">ROBI prépare son conseil...</div>')+(convoBusy?'<div class="bub gm typing">…</div>':'')+'</div>';
  h+='<div class="addrow"><input type="text" id="convo-in" placeholder="Demande à ROBI..."><button class="btn" id="convo-send">Envoyer</button></div>';
  if(kind==="obj")h+='<div style="margin-top:8px"><button class="btn ghost" id="convo-mktask" style="width:100%">＋ Créer une tâche depuis ce conseil</button></div>';
  openModal(h);
  var box=document.getElementById("convobox");if(box)box.scrollTop=box.scrollHeight;
  var send=document.getElementById("convo-send"),inp=document.getElementById("convo-in");
  function doSend(){if(!inp)return;var t=inp.value.trim();if(!t)return;inp.value="";convoAsk(kind,id,t,false);}
  if(send)send.onclick=doSend;
  if(inp)inp.onkeydown=function(ev){if(ev.key==="Enter"){ev.preventDefault();doSend();}};
  var mk=document.getElementById("convo-mktask");if(mk)mk.onclick=function(){convoMakeTask(id);};
}
function convoAsk(kind,id,message,seed){
  if(convoBusy)return;var e=convoEntity(kind,id);if(!e)return;e.chat=e.chat||[];
  if(!seed)e.chat.push({role:"user",content:message});
  convoBusy=true;save();renderConvo(kind,id);

function projBlock(list,qsOf){ // les projets ouverts en pleine largeur, les autres en grille

function dueBadge(q){ // badge d'échéance sur une tâche non journalière
  if(!q.due||q.daily)return "";

  if(dd<0){col="var(--pink)";txt="⏰ en retard ("+fmtD(q.due)+")";}
  else if(dd===0){col="var(--gold)";txt="⏰ aujourd'hui";}
  else if(dd<=3){col="var(--gold)";txt="⏰ dans "+dd+" j";}
  else{col="var(--dim)";txt="⏰ "+fmtD(q.due);}
  return '<span class="tag" style="color:'+col+';border-color:'+col+'55">'+txt+'</span>';
}
function questRow(q,depth,compact,ctx){
  depth=depth||0;ctx=ctx||{};
  if(q.pub){
    var plate=today()>q.pubDate;
    return '<div class="q pubrow'+(plate?" late":"")+'"><div class="check" data-check="'+q.id+'">✓</div><div class="body"><div class="ttl">📅 '+esc(q.title)+'</div><div class="meta"><span class="tag" style="color:#ff6fb5;border-color:#ff6fb555">▶ Publication</span>'+(plate?'<span class="tag" style="color:var(--pink);border-color:var(--pink)">⚠ en retard</span>':'<span class="tag" style="color:var(--dim);border-color:var(--line-soft)">reste jusqu\'à validation</span>')+'</div></div><span class="xpv">+'+q.base+'</span></div>';
  }
  var m=STATS[questCap(q)]||STATS.mental;var pc=PCOL[q.prio||"low"];
  if(compact){var db=dueBadge(q);return '<div class="q cpt'+(q.done?" done":"")+'"><div class="check" data-check="'+q.id+'">✓</div><div class="body"><div class="ttl">'+esc(q.title)+' <span style="color:'+pc+';font-size:11px" title="priorité">⚑</span></div>'+(db?'<div class="meta">'+db+'</div>':'')+'</div><span class="xpv">+'+q.base+'</span></div>';}
  var blk=isBlocked(q),dn=depName(q);
  var sib=q.mission?S.quests.filter(function(x){return x.mission===q.mission&&x.id!==q.id;}).length:0;
  var tags="";
  if(!ctx.hideCap)tags+='<span class="tag" style="color:'+m.col+';border-color:'+m.col+'55">'+m.ic+' '+m.name+'</span>';
  if(q.mission&&!ctx.hideProj)tags+='<span class="tag" style="color:var(--dim);border-color:var(--line-soft)">▲ '+esc((find(S.missions,q.mission)||{}).title||"")+'</span>';
  tags+=dueBadge(q);
  if(q.dependsOn&&blk)tags+='<span class="tag deptag">🔒 après « '+esc(dn)+' »</span>';
  var depctrl=blk?('<span class="lock on" data-lock="'+q.id+'" title="Changer la dépendance">🔒</span>'):(sib>0?('<span class="lock" data-lock="'+q.id+'" title="Lier à une tâche de cet objectif">🔗</span>'):"");
  var acts=(rowMenu===q.id)
    ?('<span class="conv" data-convo="'+q.id+'" title="En parler à ROBI">💬</span><span class="edt" data-edit="'+q.id+'" title="Modifier / échéance">✎</span><span class="mv" data-move="'+q.id+'" title="Changer de projet">⇄</span>'+(q.daily?'<span class="gear" data-manage="'+q.id+'" title="Régler la fréquence">⚙</span>':depctrl+'<span class="del" data-del="'+q.id+'">✕</span>')+'<span class="more on" data-rowmenu="'+q.id+'" title="Fermer">×</span>')
    :('<span class="more" data-rowmenu="'+q.id+'" title="Actions">⋯</span>');
  return '<div class="q'+(q.done?" done":"")+(blk?" blkrow":"")+(depth?" sub":"")+'"'+(depth?' style="margin-left:'+(depth*18)+'px"':'')+'><div class="check" data-check="'+q.id+'">✓</div><div class="body"><div class="ttl">'+(depth?'<span style="color:var(--dim2)">↳ </span>':'')+esc(q.title)+' <span style="color:'+pc+';font-size:11px" title="priorité">⚑</span></div>'+(tags?'<div class="meta">'+tags+'</div>':'')+'</div><span class="xpv">+'+q.base+'</span>'+acts+'</div>';
}
function questTree(list,ctx){
  var byId={};list.forEach(function(q){byId[q.id]=q;});
  var kids={},roots=[];
  list.forEach(function(q){var pid=(q.dependsOn&&byId[q.dependsOn])?q.dependsOn:null;if(pid){(kids[pid]=kids[pid]||[]).push(q);}else{roots.push(q);}});
  function sf(a,b){if((a.done?1:0)!==(b.done?1:0))return (a.done?1:0)-(b.done?1:0);var ad=a.due||"9999-99-99",bd=b.due||"9999-99-99";if(ad!==bd)return ad<bd?-1:1;return b.base-a.base;} // échéances d'abord (la plus proche en haut), puis par XP
  var out="",seen={};
  function emit(q,depth){if(seen[q.id]||depth>4)return;seen[q.id]=1;out+=questRow(q,depth,false,ctx);(kids[q.id]||[]).slice().sort(sf).forEach(function(c){emit(c,depth+1);});}
  roots.sort(sf).forEach(function(q){emit(q,0);});
  list.forEach(function(q){if(!seen[q.id])emit(q,0);});
  return out;
}

function sleepToday(){var l=(S.sleepLog||[]).filter(function(x){return x.date===today();})[0];return l?l.h:null;}
function sleepAvg(n){var a=(S.sleepLog||[]).slice(0,n);if(!a.length)return null;var t=0;a.forEach(function(x){t+=x.h;});return t/a.length;}
function setSleep(h){
  S.sleepLog=S.sleepLog||[];
  var i=-1;for(var k=0;k<S.sleepLog.length;k++){if(S.sleepLog[k].date===today()){i=k;break;}}
  var first=(i<0);
  if(i>=0)S.sleepLog[i].h=h;else S.sleepLog.unshift({date:today(),h:h});
  if(S.sleepLog.length>60)S.sleepLog.length=60;
  save();
  if(first){var r=gainXP("physique",5,"Sommeil noté ("+h+" h)");sysNotify("Sommeil",h+" h notées",["+5 XP · "+STATS.physique.name]);afterGain(r);}
  else toast("Sommeil mis à jour");
  render();
}

  if(document.getElementById("chatbox"))renderChat();
}

Array.prototype.forEach.call(document.querySelectorAll("nav button"),function(b){b.onclick=function(){view=b.dataset.v;objSel=null;render();};});
/* réinitialisation retirée à la demande de Mathilde */
document.getElementById("btn-export").onclick=function(){var blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="systeme_mathilde.json";a.click();toast("Statut exporté");};
document.getElementById("btn-import").onclick=function(){document.getElementById("file-import").click();};
document.getElementById("file-import").onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);if(d&&d.hunter){S=d;if(!S.stats)S.stats={};Object.keys(STATS).forEach(function(k){if(!S.stats[k])S.stats[k]={level:1,xp:0};});if(!S.journal)S.journal=[];if(!S.focus)S.focus={sessions:0,totalMin:0};if(!S.log)S.log=[];if(typeof S.combo!=="number")S.combo=0;save();render();toast("Statut importé");}else{toast("Fichier invalide");}}catch(err){toast("Fichier invalide");}};r.readAsText(f);};

/* ---- Écran d'accueil de ROBI (ouverture façon Iron Man / JARVIS) ---- */
var BOOT_GREETS=["À votre service, quand vous le souhaitez.","Tout est prêt, je vous laisse commencer.","Je reste à votre entière disposition.","Prenez votre temps, je m'occupe du reste."];
var bootTimer=null;
function showBoot(){
  var el=document.getElementById("boot");if(!el)return;
  applyTheme();
  var h=S.hunter,rk=rankOf(h.level),mood=companionMood();
  var cached=(S.greetDate===today()&&S.greetLine);
  var todo=0;
  var mo=momentOf();
  var hello=mo==="matin"?"Bonjour":(mo==="soir"?"Bonsoir":"Bon retour");
  var brief=hello+" "+esc(h.name)+".";
  var greet=cached?S.greetLine:brief;
  el.innerHTML='<div class="bootwin">'+
    '<div class="bmk">'+robiAvatar(rk.r,mood,60)+'</div>'+
    '<div class="bsys">ROBI</div>'+
    '<div class="bbig">'+hello+'</div>'+
    '<div class="bstats"><span>Niv <b>'+h.level+'</b></span><span>Palier <b>'+rk.r+'</b></span><span>Série <b>'+(S.streak||0)+' j</b></span></div>'+
    '<div class="bbar"><i></i></div>'+
    '<div class="bgreet" id="boot-greet"><span class="who">ROBI</span>'+esc(greet)+'</div>'+
    '<div class="benter">Toucher pour entrer</div>'+
  '</div>';
  el.className="show";
  var closed=false;
  function closeBoot(){if(closed)return;closed=true;el.className="";el.onclick=null;}
  el.onclick=closeBoot;
  if(!cached){
    gm("greeting",{state:apiState(),todo:todo}).then(function(r){
      if(r&&r.line){S.greetDate=today();S.greetLine=r.line;save();var g=document.getElementById("boot-greet");if(g&&el.className==="show")g.innerHTML='<span class="who">ROBI</span>'+esc(r.line);}
    }).catch(function(){});
  }
}
function afterSync(){
  var ro=rollover();
  urgentTick();
  render();
  showBoot();
  if(ro&&ro.k==="pen"){flash("pen","PÉNALITÉ","-40 XP · Série perdue");sfx("penalty");}
  else if(ro&&ro.k==="done")sysNotify("ROBI","Journalières accomplies hier",["Série x"+ro.streak]);
  loadFeed();ingestTasks();loadCitation();
}
// D'abord on récupère la sauvegarde partagée (avec le timestamp d'origine), PUIS on traite la journée.
if(getLink()&&syncOn())syncPull(false).then(afterSync);
else afterSync();
// Au retour sur l'app (changement d'onglet, réveil de l'iPad), on récupère les derniers changements des autres appareils.
document.addEventListener("visibilitychange",function(){
  if(!document.hidden){urgentTick();updateUrgentBadge();if(syncOn())syncPull(false).then(function(){loadFeed();ingestTasks();});}
});
setInterval(function(){urgentTick();updateUrgentBadge();var c=document.getElementById("uq-count");if(c&&urgentActive())c.textContent=urgentCountdown();},60000);
initTheme();initEffects();initSecret();
})();
</script>
