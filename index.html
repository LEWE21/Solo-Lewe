<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>Le Système</title></head><body>
<style>
:root{
  --bg:#04070e; --bg2:#070d1a; --panel:#081324; --panel2:#0b1a30;
  --line:#1b4a78; --line-soft:#12345a;
  --cyan:#3ac2ff; --cyan-b:#a6e8ff; --cyan-d:#1f7fbf;
  --txt:#d3e8ff; --dim:#6386ac; --dim2:#3f5c7e;
  --violet:#9a6cff; --pink:#ff6fc7; --gold:#ffcf4d; --red:#ff4f6d; --green:#3fe6a3; --orange:#ff8a4d;
  --glow:0 0 14px rgba(58,194,255,.45);
  --font-sys:ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;
  --font-body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --ch:11px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--font-body);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:-2;background:
  radial-gradient(1200px 760px at 50% -8%,rgba(31,127,191,.22),transparent 60%),
  radial-gradient(900px 600px at 88% 112%,rgba(154,108,255,.14),transparent 60%),
  linear-gradient(180deg,var(--bg),var(--bg2))}
#grid{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.32;background-image:
  linear-gradient(rgba(58,194,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(58,194,255,.07) 1px,transparent 1px);
  background-size:44px 44px;mask-image:radial-gradient(circle at 50% 38%,#000 28%,transparent 84%)}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
#scan{position:fixed;left:0;right:0;height:150px;z-index:-1;pointer-events:none;background:linear-gradient(180deg,transparent,rgba(58,194,255,.05),transparent);animation:scan 7s linear infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 22px rgba(58,194,255,.22)}50%{box-shadow:0 0 42px rgba(58,194,255,.42)}}
@media (prefers-reduced-motion:reduce){#scan{display:none}.ring{animation:none!important}}

#app{max-width:1080px;margin:0 auto;padding:18px 16px 130px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:12px}
.brand .mark{width:34px;height:34px;display:grid;place-items:center;color:var(--cyan);border:1px solid var(--line);background:var(--panel);clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);box-shadow:var(--glow);font-size:18px}
.brand h1{font-family:var(--font-sys);font-size:15px;letter-spacing:.34em;margin:0;color:var(--cyan-b);text-transform:uppercase;text-shadow:0 0 10px rgba(58,194,255,.4)}
.brand small{display:block;font-family:var(--font-sys);font-size:9.5px;letter-spacing:.3em;color:var(--dim);margin-top:3px}
.tools{display:flex;gap:8px}
.icobtn{width:34px;height:34px;display:grid;place-items:center;background:var(--panel);color:var(--dim);border:1px solid var(--line-soft);cursor:pointer;clip-path:polygon(0 0,100% 0,100% 100%,14% 100%,0 78%);font-size:15px}
.icobtn:hover{color:var(--cyan);border-color:var(--line);box-shadow:var(--glow)}

.win{position:relative;background:linear-gradient(180deg,rgba(12,26,48,.92),rgba(8,19,36,.92));border:1px solid var(--line);
  clip-path:polygon(var(--ch) 0,100% 0,100% calc(100% - var(--ch)),calc(100% - var(--ch)) 100%,0 100%,0 var(--ch));
  box-shadow:0 0 0 1px rgba(58,194,255,.06),0 10px 40px rgba(0,0,0,.5),inset 0 0 44px rgba(31,127,191,.07);padding:18px;margin-bottom:16px}
.win::before,.win::after{content:"";position:absolute;width:16px;height:16px;border:2px solid var(--cyan);opacity:.8}
.win::before{top:6px;left:6px;border-right:0;border-bottom:0}
.win::after{bottom:6px;right:6px;border-left:0;border-top:0}
.win-h{display:flex;align-items:center;gap:10px;margin:-2px 0 14px}
.win-h .t{font-family:var(--font-sys);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--cyan-b)}
.win-h .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.win-h .r{font-family:var(--font-sys);font-size:11px;color:var(--dim);letter-spacing:.12em}

.status{display:grid;grid-template-columns:minmax(0,1fr) 1.35fr;gap:22px;align-items:center}
@media(max-width:720px){.status{grid-template-columns:1fr;gap:16px}}
.avatar{position:relative;display:grid;place-items:center;padding:6px}
.ring{position:relative;width:172px;height:172px;display:grid;place-items:center;border-radius:50%;
  background:conic-gradient(var(--cyan) calc(var(--p,25)*1%),rgba(58,194,255,.12) 0);box-shadow:0 0 34px rgba(58,194,255,.3);animation:pulse 3.5s ease-in-out infinite}
.ring::after{content:"";position:absolute;inset:12px;border-radius:50%;background:radial-gradient(circle,var(--panel2),var(--panel));border:1px solid var(--line)}
.ring .lvlwrap{position:relative;z-index:2;text-align:center}
.ring .lk{font-family:var(--font-sys);font-size:10px;letter-spacing:.3em;color:var(--dim)}
.ring .lv{font-family:var(--font-sys);font-weight:700;font-size:56px;line-height:1;color:#fff;text-shadow:0 0 18px rgba(58,194,255,.8)}
.ring .cls{font-family:var(--font-sys);font-size:10px;letter-spacing:.22em;color:var(--cyan-b);margin-top:2px}
.rankbadge{position:absolute;top:2px;right:2px;width:48px;height:54px;display:grid;place-items:center;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:linear-gradient(180deg,rgba(58,194,255,.2),rgba(8,19,36,.92))}
.rankbadge span{font-family:var(--font-sys);font-weight:700;font-size:24px}
.who{min-width:0}
.who .name{font-family:var(--font-sys);font-size:22px;letter-spacing:.14em;color:#fff;text-transform:uppercase;text-shadow:0 0 12px rgba(58,194,255,.5)}
.who .sub{font-family:var(--font-sys);font-size:11px;letter-spacing:.16em;color:var(--dim);margin:4px 0 12px}
.vitals{display:grid;gap:9px;margin:0 0 12px}
.vlab{display:flex;justify-content:space-between;font-family:var(--font-sys);font-size:9.5px;letter-spacing:.16em;color:var(--dim);margin-bottom:4px}
.vbar{height:11px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid var(--line-soft);position:relative;overflow:hidden}
.vbar>i{position:absolute;inset:0;transform-origin:left;border-radius:6px}
.vbar.hp>i{background:linear-gradient(90deg,#1f7fbf,#7fe4ff);box-shadow:0 0 12px rgba(58,194,255,.7)}
.vbar.st>i{background:linear-gradient(90deg,#c0245a,#ff7fa6);box-shadow:0 0 12px rgba(255,79,109,.6)}
.xprow{margin-bottom:12px}
.xprow .lab{display:flex;justify-content:space-between;font-family:var(--font-sys);font-size:10px;letter-spacing:.14em;color:var(--dim);margin-bottom:6px}
.bar{height:9px;background:rgba(58,194,255,.1);border:1px solid var(--line-soft);position:relative;overflow:hidden}
.bar>i{position:absolute;inset:0;transform-origin:left;background:linear-gradient(90deg,var(--cyan-d),var(--cyan),var(--cyan-b));box-shadow:0 0 12px rgba(58,194,255,.7)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-family:var(--font-sys);font-size:10px;letter-spacing:.12em;color:var(--dim);border:1px solid var(--line-soft);padding:5px 9px;background:rgba(8,19,36,.6)}
.chip b{color:var(--cyan-b);font-weight:600}
.alert{display:flex;gap:9px;align-items:center;font-family:var(--font-sys);font-size:10px;letter-spacing:.06em;color:var(--red);background:rgba(255,79,109,.08);border:1px solid rgba(255,79,109,.3);padding:8px 11px;margin-bottom:12px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{padding:13px;background:rgba(8,19,36,.7);border:1px solid var(--line-soft);clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.stat .top{display:flex;align-items:center;justify-content:space-between}
.stat .ic{font-size:19px;filter:drop-shadow(0 0 6px currentColor)}
.stat .sv{font-family:var(--font-sys);font-weight:700;font-size:22px;color:#fff}
.stat .nm{font-family:var(--font-sys);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:8px 0 7px}
.stat .bar{height:6px}
.stat .xp{font-family:var(--font-sys);font-size:9px;color:var(--dim2);margin-top:6px;letter-spacing:.08em}

.warn{display:flex;gap:10px;align-items:center;font-family:var(--font-sys);font-size:10.5px;letter-spacing:.06em;color:var(--gold);background:rgba(255,207,77,.06);border:1px solid rgba(255,207,77,.25);padding:9px 12px;margin-bottom:14px}
.q{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line-soft)}
.q:last-child{border-bottom:0}
.check{flex:none;width:24px;height:24px;border:1.5px solid var(--line);background:rgba(8,19,36,.6);cursor:pointer;display:grid;place-items:center;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);color:transparent;transition:.15s}
.check:hover{border-color:var(--cyan);box-shadow:var(--glow)}
.q.done .check{color:#04070e;background:var(--cyan);border-color:var(--cyan);box-shadow:var(--glow)}
.q .body{flex:1;min-width:0}
.q .ttl{font-size:14.5px;color:var(--txt);letter-spacing:.01em}
.q.done .ttl{color:var(--dim2);text-decoration:line-through}
.q .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
.tag{font-family:var(--font-sys);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border:1px solid;background:rgba(0,0,0,.2)}
.q .xpv{font-family:var(--font-sys);font-size:10px;color:var(--cyan);letter-spacing:.08em;white-space:nowrap}
.q .del{color:var(--dim2);cursor:pointer;font-size:16px;padding:2px 6px;flex:none}
.q .del:hover{color:var(--red)}
.q.off{opacity:.48}
.q .check.off{cursor:default;border-color:var(--line-soft);color:var(--dim2)}
.q .check.off:hover{border-color:var(--line-soft);box-shadow:none}
.q .gear{color:var(--dim2);cursor:pointer;font-size:15px;padding:2px 6px;flex:none}
.q .gear:hover{color:var(--cyan)}
.mbanner{font-family:var(--font-sys);font-size:11px;letter-spacing:.04em;color:var(--gold);border:1px solid var(--line);background:rgba(255,207,77,.08);padding:9px 11px;margin:0 0 10px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.mbanner a{color:var(--dim);cursor:pointer;font-size:10px;text-decoration:underline}
.addrow{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.addrow input[type=text]{flex:1;min-width:150px;background:rgba(8,19,36,.8);border:1px solid var(--line-soft);color:var(--txt);padding:11px 12px;font-family:var(--font-body);font-size:14px;outline:none}
.addrow input[type=number]{background:rgba(8,19,36,.8);border:1px solid var(--line-soft);color:var(--txt);padding:11px 12px;font-family:var(--font-body);font-size:14px;outline:none}
.addrow input:focus{border-color:var(--cyan);box-shadow:var(--glow)}
.addrow select{background:rgba(8,19,36,.8);border:1px solid var(--line-soft);color:var(--txt);padding:11px 8px;font-family:var(--font-sys);font-size:11px;letter-spacing:.04em}
.btn{font-family:var(--font-sys);font-size:11px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;background:linear-gradient(180deg,rgba(58,194,255,.22),rgba(58,194,255,.06));color:var(--cyan-b);border:1px solid var(--line);padding:11px 16px;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px)}
.btn:hover{box-shadow:var(--glow);color:#fff}
.btn.ghost{background:rgba(8,19,36,.5);color:var(--dim)}
.btn.sel{border-color:var(--cyan);color:#fff;box-shadow:var(--glow)}
.subhead{font-family:var(--font-sys);font-size:10px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin:4px 0 10px}

.missions{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:640px){.missions{grid-template-columns:1fr}}
.mission{position:relative;padding:15px;background:linear-gradient(160deg,rgba(12,26,48,.9),rgba(8,19,36,.9));border:1px solid var(--line-soft);clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}
.mission .mrank{position:absolute;top:12px;right:12px;font-family:var(--font-sys);font-weight:700;font-size:20px;width:34px;height:38px;display:grid;place-items:center;clip-path:polygon(50% 0,100% 28%,100% 72%,50% 100%,0 72%,0 28%);background:rgba(0,0,0,.35);border:1px solid var(--line-soft)}
.mission .mt{font-family:var(--font-sys);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#fff;padding-right:44px}
.mission .mn{font-size:12px;color:var(--dim);margin:6px 0 12px}
.mission .mp{display:flex;justify-content:space-between;font-family:var(--font-sys);font-size:9.5px;color:var(--dim);letter-spacing:.1em;margin-bottom:6px}
.mission.clear{border-color:var(--green)}
.mission.clear .mt{color:var(--green)}

.evgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:640px){.evgrid{grid-template-columns:repeat(2,1fr)}}
.kpi{padding:14px;background:rgba(8,19,36,.7);border:1px solid var(--line-soft);text-align:center;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.kpi .v{font-family:var(--font-sys);font-weight:700;font-size:24px;color:#fff;text-shadow:0 0 12px rgba(58,194,255,.5)}
.kpi .k{font-family:var(--font-sys);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-top:5px}
.logline{font-family:var(--font-sys);font-size:11px;color:var(--dim);padding:7px 4px;border-bottom:1px solid var(--line-soft);letter-spacing:.02em}
.logline .tm{color:var(--dim2);float:right;font-size:10px}

.jentry{padding:11px 4px;border-bottom:1px solid var(--line-soft)}
.jentry .jh{display:flex;justify-content:space-between;align-items:center}
.jentry .jmo{font-size:22px}
.jentry .jd{font-family:var(--font-sys);font-size:10px;color:var(--dim);letter-spacing:.1em}
.jentry .jn{font-size:13px;color:var(--txt);margin-top:6px}
.ftclock{font-family:var(--font-sys);font-weight:700;font-size:66px;color:#fff;text-shadow:0 0 26px rgba(58,194,255,.6);letter-spacing:.04em;margin:6px 0}
.ftphase{font-family:var(--font-sys);font-size:11px;letter-spacing:.28em}
.ftcycle{font-family:var(--font-sys);font-size:11px;color:var(--dim);letter-spacing:.16em}

nav{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:20;display:flex;gap:2px;background:rgba(8,19,36,.92);border:1px solid var(--line);padding:6px;backdrop-filter:blur(8px);max-width:calc(100vw - 20px);overflow-x:auto;clip-path:polygon(14px 0,100% 0,100% 100%,0 100%,0 14px);box-shadow:0 8px 30px rgba(0,0,0,.6)}
nav button{background:none;border:0;color:var(--dim);cursor:pointer;padding:9px 11px;font-family:var(--font-sys);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;display:grid;justify-items:center;gap:5px;white-space:nowrap}
nav button .ni{font-size:16px;line-height:1}
nav button.on{color:var(--cyan-b)}
nav button.on .ni{filter:drop-shadow(0 0 8px var(--cyan))}
nav button:hover{color:var(--txt)}

#nstack{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:45;display:flex;flex-direction:column;gap:8px;width:min(400px,92vw);pointer-events:none}
.ncard{pointer-events:auto;background:linear-gradient(180deg,rgba(12,30,56,.97),rgba(8,18,36,.97));border:1px solid var(--cyan);clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);box-shadow:0 0 24px rgba(58,194,255,.4);padding:12px 14px;animation:ncardIn .35s ease both}
.ncard.out{animation:ncardOut .35s ease forwards}
.ncard .nt{font-family:var(--font-sys);font-size:9.5px;letter-spacing:.24em;color:var(--cyan);text-transform:uppercase}
.ncard .nti{font-size:14px;color:#fff;margin-top:5px}
.ncard .nln{font-family:var(--font-sys);font-size:11px;color:var(--cyan-b);letter-spacing:.04em;margin-top:5px}
@keyframes ncardIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes ncardOut{to{opacity:0;transform:translateY(-10px)}}

#flash{position:fixed;inset:0;z-index:55;display:none;place-items:center;pointer-events:none;background:radial-gradient(circle at 50% 44%,rgba(58,194,255,.16),transparent 62%)}
#flash.show{display:grid}
.flashwin{text-align:center;pointer-events:auto;padding:20px;animation:flashIn .5s cubic-bezier(.2,.85,.25,1) both}
.flashwin .fbig{font-family:var(--font-sys);font-weight:800;font-size:clamp(46px,13vw,92px);letter-spacing:.04em;color:#fff;text-shadow:0 0 30px var(--cyan),0 0 70px rgba(58,194,255,.6);line-height:1}
.flashwin.rank .fbig{color:var(--gold);text-shadow:0 0 30px var(--gold),0 0 70px rgba(255,207,77,.5)}
.flashwin.pen .fbig{color:var(--red);text-shadow:0 0 30px var(--red),0 0 70px rgba(255,79,109,.5)}
.flashwin .fsub{font-family:var(--font-sys);font-size:13px;letter-spacing:.22em;color:var(--cyan-b);margin-top:12px;text-transform:uppercase}
.flashwin.pen .fsub{color:#ffb3c0}
@keyframes flashIn{0%{opacity:0;transform:scale(.55)}55%{opacity:1}100%{opacity:1;transform:scale(1)}}
#ask{position:fixed;inset:0;z-index:60;display:none;place-items:center;background:rgba(2,5,11,.8);backdrop-filter:blur(4px);padding:20px}
#ask.show{display:grid}
.askwin{width:min(430px,92vw);padding:24px;background:linear-gradient(180deg,rgba(12,30,56,.98),rgba(8,18,36,.98));border:1px solid var(--cyan);clip-path:polygon(var(--ch) 0,100% 0,100% calc(100% - var(--ch)),calc(100% - var(--ch)) 100%,0 100%,0 var(--ch));box-shadow:0 0 44px rgba(58,194,255,.4),inset 0 0 40px rgba(58,194,255,.06);animation:flashIn .3s ease both}
.askwin .ntag{font-family:var(--font-sys);font-size:10px;letter-spacing:.3em;color:var(--cyan);text-transform:uppercase}
.askwin .asktitle{font-family:var(--font-sys);font-size:15px;color:#fff;margin:12px 0 10px;text-shadow:0 0 12px rgba(58,194,255,.4);line-height:1.4}
.askwin .asklines{font-size:13px;color:var(--txt);line-height:1.7}
.askwin .asklines b{color:var(--cyan-b)}
.askbtns{display:flex;gap:10px;margin-top:22px}
.askbtns .btn{flex:1;text-align:center}

.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:40;font-family:var(--font-sys);font-size:12px;letter-spacing:.1em;color:var(--cyan-b);background:rgba(8,19,36,.95);border:1px solid var(--line);padding:9px 16px;box-shadow:var(--glow);opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;bottom:104px}
.empty{font-family:var(--font-sys);font-size:11px;letter-spacing:.06em;color:var(--dim2);text-align:center;padding:22px}
.ibtn{display:inline-grid;place-items:center;width:15px;height:15px;border-radius:50%;border:1px solid var(--line);color:var(--cyan);font-family:var(--font-sys);font-size:9px;font-style:italic;cursor:pointer;vertical-align:middle;line-height:1}
.ibtn:hover{background:var(--cyan);color:#04070e;box-shadow:var(--glow)}
#modal{position:fixed;inset:0;z-index:62;display:none;place-items:center;background:rgba(2,5,11,.82);backdrop-filter:blur(4px);padding:18px}
#modal.show{display:grid}
.modalwin{position:relative;width:min(460px,94vw);max-height:86vh;overflow-y:auto;padding:22px;background:linear-gradient(180deg,rgba(12,28,52,.98),rgba(8,17,34,.98));border:1px solid var(--cyan);clip-path:polygon(var(--ch) 0,100% 0,100% calc(100% - var(--ch)),calc(100% - var(--ch)) 100%,0 100%,0 var(--ch));box-shadow:0 0 44px rgba(58,194,255,.4);animation:flashIn .3s ease both}
.mclose{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--dim);font-size:16px}
.mclose:hover{color:var(--red)}
.mtag{font-family:var(--font-sys);font-size:10px;letter-spacing:.3em;color:var(--cyan);text-transform:uppercase}
.mtitle{font-family:var(--font-sys);font-size:17px;color:#fff;margin:10px 0 10px;text-shadow:0 0 12px rgba(58,194,255,.4);line-height:1.4}
.mbody{font-size:13.5px;color:var(--txt);line-height:1.7}
.chatbox{height:min(46vh,400px);overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:6px 2px}

function classifyQuest(title){
  var t=title.toLowerCase(),stat="mental",mission=null,found=false;
  for(var i=0;i<KW.length&&!found;i++){for(var j=0;j<KW[i].w.length;j++){if(t.indexOf(KW[i].w[j])>=0){stat=KW[i].s;mission=KW[i].m;found=true;break;}}}
  var prio="med";
  if(/urgent|important|asap|deadline|!!|impératif|au plus vite/.test(t))prio="high";
  else if(/optionnel|un jour|peut-être|peut etre|si le temps|plus tard/.test(t))prio="low";
  var daily=/chaque jour|tous les jours|quotidien|daily|routine matin/.test(t);
  return {stat:stat,mission:mission,prio:prio,daily:daily};
}
function autoRank(name){
  var t=name.toLowerCase();
  if(/site|lancer|entreprise|business|marché|marche|startup|monétis|distribu|éditer/.test(t))return "A";
  if(/organis|ranger|routine|quotidien|discipline|ménage/.test(t))return "D";
  return "C";
}

function ensureProposals(state){
  if(state._p1)return;
  if(!state.quests)state.quests=[];
  for(var i=0;i<PROPOSALS.length;i++){var pq=PROPOSALS[i];var ex=false;for(var j=0;j<state.quests.length;j++){if(state.quests[j].id===pq.id){ex=true;break;}}if(!ex)state.quests.push(pq);}
  state._p1=true;
}

      {id:"q_household",title:"Corvée maison (Household chore)",stat:"discipline",daily:false,prio:"high",base:25,done:false,mission:"m_orga"},
      {id:"q_dust",title:"Dépoussiérer le PC (bombe à air)",stat:"discipline",daily:false,prio:"low",base:12,done:false,mission:"m_orga"},
      {id:"q_epictete",title:"Travailler Épictète",stat:"mental",daily:false,prio:"low",base:12,done:false,mission:null},
      {id:"q_gifts",title:"Cadeaux Amazon (Emma, Mila, Maina, Elliot, Margot)",stat:"social",daily:false,prio:"low",base:12,done:false,mission:null},
      {id:"q_ip",title:"Trouver un logiciel d'analyse vidéo (IP)",stat:"mental",daily:false,prio:"low",base:12,done:false,mission:"m_skills"},

}
var S=load();
function readState(k){try{var r=JSON.parse(localStorage.getItem(k));return (r&&r.hunter)?r:null;}catch(e){return null;}}
function load(){
  var r=readState(KEY)||readState(BKEY);
  if(!r){r=seed();}
  else{
    if(!r.stats)r.stats={};Object.keys(STATS).forEach(function(k){if(!r.stats[k])r.stats[k]={level:1,xp:0};});
    if(!r.journal)r.journal=[];if(!r.focus)r.focus={sessions:0,totalMin:0};if(!r.log)r.log=[];if(!r.history)r.history=[];
    if(typeof r.combo!=="number")r.combo=0;if(!r.chat)r.chat=[];
    if(!("lastEpreuve" in r))r.lastEpreuve=null;if(!("epreuveOn" in r))r.epreuveOn=null;
  }
  ensureProposals(r);
  return r;
}
function save(){var j=JSON.stringify(S);try{localStorage.setItem(KEY,j);localStorage.setItem(BKEY,j);}catch(e){}}

function rollover(){
  if(S.lastDate===today())return null;
  var dailies=S.quests.filter(function(q){return q.daily&&dueOn(q,S.lastDate);});
  var out=null;
  if(dailies.length){
    var allDone=dailies.every(function(q){return q.done;});
    if(allDone){S.streak++;if(S.streak>S.best)S.best=S.streak;log("Quêtes journalières accomplies (série "+S.streak+")");out={k:"done",streak:S.streak};}
    else{S.hunter.xp=Math.max(0,S.hunter.xp-40);S.streak=0;S.combo=0;log("PÉNALITÉ : journalières non terminées (-40 XP)");out={k:"pen"};}
  }
  S.history.push({date:S.lastDate,level:S.hunter.level});if(S.history.length>120)S.history.shift();
  S.quests.forEach(function(q){if(q.daily)q.done=false;});
  S.lastDate=today();save();
  return out;
}
function log(text){S.log.unshift({t:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),text:text});if(S.log.length>80)S.log.pop();}

function gainXP(statKey,gain,label){
  var st=S.stats[statKey]||(S.stats[statKey]={level:1,xp:0});
  var su=0;st.xp+=gain;while(st.xp>=statNeed(st.level)){st.xp-=statNeed(st.level);st.level++;su++;}
  var h=S.hunter,beforeRank=rankOf(h.level).r,lu=0;
  h.xp+=gain;while(h.xp>=xpNeed(h.level)){h.xp-=xpNeed(h.level);h.level++;lu++;}
  log(label+" (+"+gain+" XP "+STATS[statKey].name+")");save();
  return {gain:gain,statKey:statKey,statLeveled:su>0,statLevel:st.level,leveled:lu>0,level:h.level,rankChanged:rankOf(h.level).r!==beforeRank,rank:rankOf(h.level).r};
}
function afterGain(r){
  if(r.rankChanged)flash("rank","RANG "+r.rank,"Chasseur promu");
  else if(r.leveled)flash("level","LEVEL UP","Niveau "+r.level+(r.statLeveled?" · +1 "+STATS[r.statKey].name:""));
}
function award(q){
  S.doneCount++;S.combo++;
  var r=gainXP(q.stat,q.base,"Quête : "+q.title);
  var m=STATS[q.stat];
  var lines=["+"+r.gain+" XP · "+m.name.toUpperCase(),"COMBO x"+S.combo];
  if(r.statLeveled)lines.push(m.name+" niv "+r.statLevel);
  sysNotify("Quête accomplie",esc(q.title),lines);
  afterGain(r);save();
}

/* notifications */
function sysNotify(tag,title,lines){
  var st=document.getElementById("nstack");if(!st)return;
  var c=document.createElement("div");c.className="ncard";
  c.innerHTML='<div class="nt">▸ '+tag+'</div>'+(title?'<div class="nti">'+title+'</div>':'')+((lines&&lines.length)?'<div class="nln">'+lines.join("  ·  ")+'</div>':'');
  st.appendChild(c);
  setTimeout(function(){c.classList.add("out");setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},350);},3400);
}
var flashT;
function flash(kind,big,sub){
  var el=document.getElementById("flash");if(!el)return;
  el.className="show";
  el.innerHTML='<div class="flashwin '+(kind||"")+'"><div class="fbig">'+big+'</div>'+(sub?'<div class="fsub">'+sub+'</div>':'')+'</div>';
  clearTimeout(flashT);flashT=setTimeout(function(){el.className="";},kind==="pen"?3400:2100);
  el.onclick=function(){clearTimeout(flashT);el.className="";};
}
var tt;
function toast(m){var e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(tt);tt=setTimeout(function(){e.classList.remove("show");},1500);}
function sysConfirm(title,lines,onYes){

  document.getElementById("ask-yes").onclick=function(){el.className="";onYes();};
  document.getElementById("ask-no").onclick=function(){el.className="";};
}

/* focus timer */
var FT={running:false,started:false,phase:"focus",remaining:0,focusMin:30,breakMin:5,cycles:4,cycleNow:1,stat:"mental"};
var ftInt=null,jMood=3;
function ftFmt(s){var m=Math.floor(s/60),ss=s%60;return String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0");}
function readFtCfg(){
  var f=document.getElementById("ft-focus"),b=document.getElementById("ft-break"),c=document.getElementById("ft-cycles"),st=document.getElementById("ft-stat");
  if(f)FT.focusMin=Math.max(1,parseInt(f.value,10)||FT.focusMin);
  if(b)FT.breakMin=Math.max(1,parseInt(b.value,10)||FT.breakMin);
  if(c)FT.cycles=Math.max(1,parseInt(c.value,10)||FT.cycles);
  if(st)FT.stat=st.value;
}
function ftStart(){if(!FT.started){readFtCfg();FT.phase="focus";FT.cycleNow=1;FT.remaining=FT.focusMin*60;FT.started=true;}FT.running=true;if(ftInt)clearInterval(ftInt);ftInt=setInterval(ftTick,1000);render();}
function ftPause(){FT.running=false;if(ftInt){clearInterval(ftInt);ftInt=null;}render();}
function ftReset(){FT.running=false;FT.started=false;if(ftInt){clearInterval(ftInt);ftInt=null;}FT.phase="focus";FT.cycleNow=1;FT.remaining=FT.focusMin*60;render();}
function ftTick(){
  if(!FT.running)return;
  FT.remaining--;
  if(FT.remaining<=0){
    if(FT.phase==="focus"){
      S.focus.sessions++;S.focus.totalMin+=FT.focusMin;
      var r=gainXP(FT.stat,20,"Session Focus ("+FT.focusMin+" min)");
      sysNotify("Focus",FT.focusMin+" min de concentration",["+20 XP · "+STATS[FT.stat].name.toUpperCase()]);
      afterGain(r);
      if(FT.cycleNow>=FT.cycles){ftReset();flash("level","FOCUS COMPLET",FT.cycles+" cycles terminés");return;}
      FT.phase="break";FT.remaining=FT.breakMin*60;
    }else{FT.phase="focus";FT.cycleNow++;FT.remaining=FT.focusMin*60;}
    if(view==="focus")render();
    return;
  }
  var el=document.getElementById("ft-clock");if(el)el.textContent=ftFmt(FT.remaining);
}

/* render */
var view="statut";
function pct(cur,need){return Math.max(0,Math.min(100,cur/need*100));}
function bar(cur,need){return '<div class="bar"><i style="transform:scaleX('+(pct(cur,need)/100)+')"></i></div>';}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function find(arr,id){for(var i=0;i<arr.length;i++)if(arr[i].id===id)return arr[i];return null;}
function uid(){return "x"+Math.random().toString(36).slice(2,9);}
function kpi(v,k){return '<div class="kpi"><div class="v">'+v+'</div><div class="k">'+k+'</div></div>';}
function dayDiff(a,b){return Math.round((new Date(a)-new Date(b))/86400000);}
function cadLabel(q){var c=q.cad;if(q.paused)return "en pause";if(!c||(!(c.days&&c.days.length)&&(!c.n||c.n<=1)))return "chaque jour";if(c.days&&c.days.length){var J=["dim","lun","mar","mer","jeu","ven","sam"];return c.days.map(function(d){return J[d];}).join("/");}return "tous les "+c.n+" jours";}
function dueOn(q,ds){if(!q.daily)return true;if(q.paused)return false;var c=q.cad;if(!c)return true;if(c.days&&c.days.length)return c.days.indexOf(new Date(ds+"T12:00:00").getDay())>=0;var n=c.n||1;if(n<=1)return true;var anc=c.anchor||ds;var d=dayDiff(ds,anc);return ((d%n)+n)%n===0;}
function dueToday(q){return dueOn(q,today());}
function dailyInfo(){var d=S.quests.filter(function(q){return q.daily&&dueToday(q);});return {tot:d.length,done:d.filter(function(q){return q.done;}).length};}

/* ---- Fenêtre modale ---- */
function openModal(html,color){

  el.className="show";
  var c=document.getElementById("m-close");if(c)c.onclick=closeModal;
  el.onclick=function(ev){if(ev.target===el)closeModal();};
}
function closeModal(){var el=document.getElementById("modal");if(el)el.className="";}
function showInfo(key){var it=INFO[key];if(!it)return;openModal('<div class="mtag">▸ Système</div><div class="mtitle">'+it.t+'</div><div class="mbody">'+it.d+'</div>');}

/* ---- Donjon : fenêtre détaillée ---- */
function openDungeon(mId){
  var m=find(S.missions,mId);if(!m)return;
  var rk=(RANKS.filter(function(r){return r.r===m.rank;})[0]||RANKS[0]);
  var qs=S.quests.filter(function(q){return q.mission===m.id;});
  var done=qs.filter(function(q){return q.done;}).length;
  var h='<div class="mtag" style="color:'+rk.c+'">▸ Donjon · Rang '+m.rank+'</div><div class="mtitle" style="color:'+rk.c+'">'+esc(m.title)+'</div>';
  if(m.note)h+='<div class="mbody" style="margin-bottom:12px">'+esc(m.note)+'</div>';
  h+='<div style="display:flex;justify-content:space-between;font-family:var(--font-sys);font-size:9.5px;color:var(--dim);letter-spacing:.1em;margin-bottom:6px"><span>PROGRESSION</span><span>'+done+' / '+qs.length+'</span></div>'+bar(done,Math.max(1,qs.length));
  h+='<div class="subhead" style="margin:16px 0 4px">Quêtes du donjon</div>';
  h+=qs.length?qs.map(questRow).join(""):'<div class="empty">Aucune quête. Ajoutes-en une ci-dessous.</div>';
  h+='<div class="addrow"><input type="text" id="dq-title" placeholder="Nouvelle quête pour ce donjon..."><button class="btn" id="dq-add">Ajouter</button></div>';
  openModal(h,rk.c);
  Array.prototype.forEach.call(document.querySelectorAll("#modal [data-check]"),function(el){el.onclick=function(){var q=find(S.quests,el.dataset.check);if(!q||q.done)return;sysConfirm("As-tu vraiment accompli cette quête ?",["<b>« "+esc(q.title)+" »</b>","","Le Système ne récompense que le réel."],function(){q.done=true;award(q);render();openDungeon(mId);});};});
  Array.prototype.forEach.call(document.querySelectorAll("#modal [data-del]"),function(el){el.onclick=function(){S.quests=S.quests.filter(function(q){return q.id!==el.dataset.del;});save();render();openDungeon(mId);};});
  Array.prototype.forEach.call(document.querySelectorAll("#modal [data-manage]"),function(el){el.onclick=function(){openManage(el.dataset.manage);};});
  var a=document.getElementById("dq-add");
  if(a)a.onclick=function(){var t=document.getElementById("dq-title").value.trim();if(!t)return;var c=classifyQuest(t);S.quests.push({id:uid(),title:t,stat:c.stat,daily:c.daily,prio:c.prio,base:baseFor(c.prio,c.daily),done:false,mission:mId});save();render();openDungeon(mId);};
}

/* ---- Maître du jeu (chat) ---- */
var chatBusy=false;
var manageId=null;
function openManage(id){var q=find(S.quests,id);if(!q)return;closeModal();manageId=id;view="maitre";render();
  sendChat("Je veux gérer ma quête journalière « "+q.title+" » (actuellement "+cadLabel(q)+"). Aide-moi à changer sa fréquence (tous les N jours, ou certains jours de la semaine), la mettre en pause, la réactiver, ou la retirer. Pose-moi une question courte, puis j'appliquerai.");}
function applyDailyEdit(){
  if(chatBusy||!manageId)return;
  var q=find(S.quests,manageId);if(!q){manageId=null;render();return;}
  var recent=(S.chat||[]).slice(-8).map(function(mm){return (mm.role==="user"?"Moi: ":"MJ: ")+mm.content;}).join("\n");
  toast("Le Système ajuste...");
  gm("edit_daily",{description:recent,quest:{id:q.id,title:q.title,cad:q.cad||null,paused:!!q.paused}}).then(function(r){
    if(!r||!r.op||r.op==="none"){pushChat("assistant","Je n'ai pas saisi le changement. Précise (ex : « tous les 2 jours », « lundi mercredi vendredi », « pause », « retire-la »).");renderChat();return;}
    var msg="";
    if(r.op==="cadence_everyN"){var n=Math.max(1,r.everyN||1);q.cad={n:n,anchor:today()};q.paused=false;msg=n<=1?"« "+q.title+" » revient chaque jour.":"« "+q.title+" » : désormais tous les "+n+" jours.";}
    else if(r.op==="cadence_weekdays"){var days=(r.weekdays||[]).filter(function(d){return d>=0&&d<=6;});if(!days.length){pushChat("assistant","Quels jours précisément ?");renderChat();return;}q.cad={days:days};q.paused=false;msg="« "+q.title+" » : désormais "+cadLabel(q)+".";}
    else if(r.op==="pause"){q.paused=true;msg="« "+q.title+" » mise en pause. Elle ne compte plus dans les journalières.";}
    else if(r.op==="resume"){q.paused=false;msg="« "+q.title+" » réactivée : "+cadLabel(q)+".";}
    else if(r.op==="delete"){S.quests=S.quests.filter(function(x){return x.id!==q.id;});msg="« "+q.title+" » retirée des journalières.";}
    else{pushChat("assistant","Action inconnue.");renderChat();return;}
    save();manageId=null;pushChat("assistant","✔ "+msg);log("Journalière ajustée : "+q.title);render();
  }).catch(function(){toast("Erreur réseau");});
}
function pushChat(role,content){S.chat=S.chat||[];S.chat.push({role:role,content:content});if(S.chat.length>60)S.chat.shift();save();}
function renderChat(){
  var box=document.getElementById("chatbox");if(!box)return;
  var msgs=S.chat||[];
  var html=msgs.length?msgs.map(function(mm){return '<div class="bub '+(mm.role==="user"?"me":"gm")+'">'+esc(mm.content).replace(/\n/g,"<br>")+'</div>';}).join(""):'<div class="empty">Parle au maître du jeu. Il te met à l\'épreuve et t\'aide à créer tes quêtes.</div>';
  if(chatBusy)html+='<div class="bub gm typing">…</div>';
  box.innerHTML=html;box.scrollTop=box.scrollHeight;
}
function sendChat(message){
  if(chatBusy||!message)return;
  pushChat("user",message);chatBusy=true;renderChat();
  gm("chat",{message:message,history:(S.chat||[]).slice(0,-1).slice(-16),state:apiState()}).then(function(r){
    chatBusy=false;pushChat("assistant",(r&&r.reply)?r.reply:"(Le Système est silencieux. Réessaie.)");if(view==="maitre")renderChat();
  }).catch(function(){chatBusy=false;pushChat("assistant","(Connexion au Système impossible. Réessaie.)");if(view==="maitre")renderChat();});
}
function makeQuestFromChat(){
  if(chatBusy)return;
  var recent=(S.chat||[]).slice(-8).map(function(mm){return (mm.role==="user"?"Moi: ":"MJ: ")+mm.content;}).join("\n");
  if(!recent){toast("Parle d'abord de ce que tu veux faire");return;}
  var dungeons=S.missions.map(function(m){return {id:m.id,title:m.title};});
  toast("Le Système forge la quête...");
  gm("make_quest",{description:recent,dungeons:dungeons}).then(function(q){
    if(!q||!q.title){toast("Impossible de créer la quête");return;}
    var stat=STATS[q.stat]?q.stat:"mental";
    var prio=["high","med","low"].indexOf(q.prio)>=0?q.prio:"med";
    var daily=!!q.daily;
    var mission=(q.mission&&find(S.missions,q.mission))?q.mission:null;
    S.quests.push({id:uid(),title:q.title,stat:stat,daily:daily,prio:prio,base:baseFor(prio,daily),done:false,mission:mission});save();
    pushChat("assistant","✔ Quête créée : « "+q.title+" » ("+STATS[stat].name+", "+(daily?"journalière":"priorité "+prio)+").");if(view==="maitre")renderChat();
    sysNotify("Quête créée",q.title,[STATS[stat].name]);
  }).catch(function(){toast("Erreur réseau");});
}
function claimEpreuve(){
  if(chatBusy)return;
  if(S.lastEpreuve===today()){toast("Une épreuve récompensée par jour. Reviens demain.");return;}
  S.lastEpreuve=today();S.epreuveOn=null;
  var r=gainXP("mental",25,"Épreuve d'Épictète relevée");
  sysNotify("Épreuve relevée","+25 XP · MENTAL",["La liberté se gagne par l'exercice"]);
  afterGain(r);save();
  pushChat("assistant","✔ Épreuve validée. +25 XP Mental. Ce n'est pas l'épreuve qui compte, mais de l'avoir traversée en homme libre.");
  render();
}

  var mng=manageId?find(S.quests,manageId):null;
  var s='<div class="win"><div class="win-h"><span class="t">Maître du Jeu</span><span class="ln"></span><span class="r">Mentor stoïcien</span></div>';
  if(mng)s+='<div class="mbanner"><span>⚙ Gestion de la journalière : « '+esc(mng.title)+' »</span><a id="c-cancel">annuler</a></div>';

function render(){
  var v=document.getElementById("view");
  if(view==="statut")v.innerHTML=vStatut();
  else if(view==="quetes")v.innerHTML=vQuetes();
  else if(view==="donjons")v.innerHTML=vDonjons();

function questRow(q){

  s+='<div class="evgrid">'+kpi(h.level,"Niveau")+kpi(rk.r,"Rang")+kpi(S.doneCount,"Quêtes")+kpi(S.best,"Record série")+'</div>';
  s+='<div class="subhead">Caractéristiques</div><div style="display:grid;gap:10px">';
  Object.keys(STATS).forEach(function(k){var st=S.stats[k],m=STATS[k];
    s+='<div><div style="display:flex;justify-content:space-between;font-family:var(--font-sys);font-size:10px;color:var(--dim);letter-spacing:.1em;margin-bottom:5px"><span>'+m.ic+' '+m.name+'</span><span>Niv '+st.level+'</span></div><div class="bar" style="height:8px"><i style="transform:scaleX('+Math.min(1,st.level/Math.max(10,st.level+2))+');background:linear-gradient(90deg,'+m.col+'44,'+m.col+')"></i></div></div>';});
  s+='</div></div>';
  s+='<div class="win"><div class="win-h"><span class="t">Journal du Système</span><span class="ln"></span><span class="r">'+S.log.length+'</span></div>';
  s+=S.log.length?S.log.slice(0,20).map(function(l){return '<div class="logline"><span class="tm">'+l.t+'</span>'+esc(l.text)+'</div>';}).join(""):'<div class="empty">Aucune activité.</div>';
  s+='</div>';
  return s;
}

function bind(){
  Array.prototype.forEach.call(document.querySelectorAll("#view [data-check]"),function(el){el.onclick=function(){var q=find(S.quests,el.dataset.check);if(!q||q.done)return;sysConfirm("As-tu vraiment accompli cette quête ?",["<b>« "+esc(q.title)+" »</b>","","Inutile de tricher : ton niveau ne reflète que tes vrais efforts. Le Système ne récompense que le réel."],function(){q.done=true;award(q);render();});};});
  Array.prototype.forEach.call(document.querySelectorAll("#view [data-del]"),function(el){el.onclick=function(){S.quests=S.quests.filter(function(q){return q.id!==el.dataset.del;});save();render();};});
  Array.prototype.forEach.call(document.querySelectorAll("[data-info]"),function(el){el.onclick=function(ev){ev.stopPropagation();showInfo(el.dataset.info);};});
  Array.prototype.forEach.call(document.querySelectorAll("[data-dungeon]"),function(el){el.onclick=function(){openDungeon(el.dataset.dungeon);};});
  Array.prototype.forEach.call(document.querySelectorAll("#view [data-manage]"),function(el){el.onclick=function(){openManage(el.dataset.manage);};});
  var qa=document.getElementById("q-add");
  if(qa)qa.onclick=function(){var t=document.getElementById("q-title").value.trim();if(!t)return;var c=classifyQuest(t);var q={id:uid(),title:t,stat:c.stat,daily:c.daily,prio:c.prio,base:baseFor(c.prio,c.daily),done:false,mission:c.mission};S.quests.push(q);save();var mn=q.mission?((find(S.missions,q.mission)||{}).title||"Aucun donjon"):"Aucun donjon";sysNotify("Quête classée",esc(t),[STATS[q.stat].name+" · "+(q.daily?"Journalière":"Priorité "+q.prio)+" · +"+q.base+" XP","Donjon : "+mn]);render();};
  var ma=document.getElementById("m-add");
  if(ma)ma.onclick=function(){var t=document.getElementById("m-title").value.trim();if(!t)return;var noteEl=document.getElementById("m-note");var nt=noteEl?noteEl.value.trim():"";var rk=autoRank(t);S.missions.push({id:uid(),title:t,rank:rk,note:nt});save();sysNotify("Donjon créé",esc(t),["Rang attribué : "+rk,"Dis-moi ses quêtes dans Claude Code"]);render();};
  var jbs=document.querySelectorAll(".jm");
  Array.prototype.forEach.call(jbs,function(b){b.onclick=function(){jMood=parseInt(b.dataset.m,10);Array.prototype.forEach.call(jbs,function(x){x.classList.toggle("sel",x===b);});};});
  var ja=document.getElementById("j-add");
  if(ja)ja.onclick=function(){var sl=document.getElementById("j-sleep").value,nt=document.getElementById("j-note").value.trim();S.journal.unshift({date:today(),mood:jMood,sleep:sl!==""?parseFloat(sl):null,note:nt});var r=gainXP("mental",10,"Entrée de journal");sysNotify("Journal","Entrée enregistrée",["+10 XP · MENTAL"]);afterGain(r);jMood=3;render();};
  var fs=document.getElementById("ft-start");if(fs)fs.onclick=ftStart;
  var fp=document.getElementById("ft-pause");if(fp)fp.onclick=ftPause;
  var fr=document.getElementById("ft-reset");if(fr)fr.onclick=ftReset;
  var ci=document.getElementById("c-input"),cs=document.getElementById("c-send");
  function doSend(){if(!ci)return;var t=ci.value.trim();if(!t)return;ci.value="";sendChat(t);}
  if(cs)cs.onclick=doSend;
  if(ci)ci.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();doSend();}};
  var ce=document.getElementById("c-epreuve");if(ce)ce.onclick=function(){S.epreuveOn=today();save();sendChat("Maître, mets-moi à l'épreuve aujourd'hui. Donne-moi un défi stoïcien concret, inspiré d'Épictète, adapté à ma journée. Reste moderne, pas radical. Réponds-moi en français.");render();};
  var ccm=document.getElementById("c-claim");if(ccm)ccm.onclick=claimEpreuve;
  var cg=document.getElementById("c-guide");if(cg)cg.onclick=function(){sendChat("Aide-moi à créer une quête. Pose-moi 1 ou 2 questions courtes pour préciser ce que je dois faire, puis propose un titre concret. Réponds en français.");};
  var cv=document.getElementById("c-valider");if(cv)cv.onclick=makeQuestFromChat;
  var cap=document.getElementById("c-apply");if(cap)cap.onclick=applyDailyEdit;
  var ccl=document.getElementById("c-cancel");if(ccl)ccl.onclick=function(){manageId=null;pushChat("assistant","Gestion annulée. Rien n'a changé.");render();};
  if(document.getElementById("chatbox"))renderChat();
}

Array.prototype.forEach.call(document.querySelectorAll("nav button"),function(b){b.onclick=function(){view=b.dataset.v;render();};});
/* réinitialisation retirée à la demande de Mathilde */
document.getElementById("btn-export").onclick=function(){var blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="systeme_mathilde.json";a.click();toast("Statut exporté");};
document.getElementById("btn-import").onclick=function(){document.getElementById("file-import").click();};
document.getElementById("file-import").onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);if(d&&d.hunter){S=d;if(!S.stats)S.stats={};Object.keys(STATS).forEach(function(k){if(!S.stats[k])S.stats[k]={level:1,xp:0};});if(!S.journal)S.journal=[];if(!S.focus)S.focus={sessions:0,totalMin:0};if(!S.log)S.log=[];if(typeof S.combo!=="number")S.combo=0;save();render();toast("Statut importé");}else{toast("Fichier invalide");}}catch(err){toast("Fichier invalide");}};r.readAsText(f);};

var ro=rollover();
render();
if(ro&&ro.k==="pen")flash("pen","PÉNALITÉ","-40 XP · Série perdue");
else if(ro&&ro.k==="done")sysNotify("Système","Journalières accomplies hier",["Série x"+ro.streak]);
})();
</script>
</body></html>
